<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Коллаж Сеть Premium</title>
    <style>
        :root {
            --bg-main: #f2f4f7;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --panel-border: rgba(0, 0, 0, 0.08);
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --accent: #0071e3;
            --accent-gradient: linear-gradient(135deg, #0071e3 0%, #34aadc 100%);
            --bubble-in: #ffffff;
            --bubble-out: #0071e3;
            --bubble-out-text: #ffffff;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 12px 30px rgba(0, 0, 0, 0.08);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            --sidebar-width: 350px;
            --chat-wallpaper: linear-gradient(180deg, #f2f4f7 0%, #e5e9f0 100%);
        }

        [data-theme="dark"] {
            --bg-main: #0c0c0e;
            --panel-bg: rgba(22, 22, 26, 0.85);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --accent: #2997ff;
            --accent-gradient: linear-gradient(135deg, #2997ff 0%, #64d2ff 100%);
            --bubble-in: #1c1c1e;
            --bubble-out: #2997ff;
            --bubble-out-text: #ffffff;
            --shadow-md: 0 12px 40px rgba(0, 0, 0, 0.3);
            --chat-wallpaper: linear-gradient(180deg, #0c0c0e 0%, #16161a 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body, html { width: 100%; height: 100%; background: var(--bg-main); color: var(--text-primary); overflow: hidden; position: relative; }

        /* ОСНОВНОЙ КОНТЕЙНЕР СЕТКИ */
        #app-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            position: relative;
            overflow: hidden;
        }

        /* САЙДБАР (ЛЕВАЯ ЧАСТЬ) */
        #sidebar-container {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--panel-bg);
            border-right: 1px solid var(--panel-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            z-index: 10;
            flex-shrink: 0;
            transition: var(--transition);
        }

        /* ОКНО ЧАТА (ПРАВАЯ ЧАСТЬ) */
        #main-chat-container {
            flex: 1;
            height: 100%;
            background: var(--chat-wallpaper);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 5;
            transition: var(--transition);
        }

        /* АДАПТИВНАЯ МОБИЛЬНАЯ ЛОГИКА СДВИГА ОКН */
        @media (max-width: 768px) {
            #sidebar-container {
                width: 100vw;
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 10;
                transform: translateX(0);
            }
            #main-chat-container {
                width: 100vw;
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 20;
                transform: translateX(100vw); /* Спрятан за экраном справа */
            }
            /* Когда активирован чат на мобилке */
            #app-layout.chat-opened #sidebar-container {
                transform: translateX(-30vw); /* Слегка уезжает назад для эффекта глубины */
                opacity: 0.5;
            }
            #app-layout.chat-opened #main-chat-container {
                transform: translateX(0); /* Выезжает на передний план */
            }
            .mobile-back-trigger {
                display: flex !important; /* Показываем кнопку назад только на мобилках */
            }
        }

        /* Элементы шапки */
        .sidebar-header { padding: 20px 16px 12px; display: flex; align-items: center; justify-content: space-between; }
        .brand-title { font-size: 22px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .search-box { padding: 0 16px 12px; }
        .search-inner { display: flex; align-items: center; background: rgba(142,142,147,0.12); padding: 8px 12px; border-radius: var(--radius-sm); }
        .search-inner input { border: none; background: transparent; outline: none; width: 100%; margin-left: 8px; color: var(--text-primary); font-size: 14px; }

        .tab-bar { display: flex; padding: 0 12px 10px; border-bottom: 1px solid var(--panel-border); gap: 4px; }
        .tab-btn { flex: 1; padding: 8px; border: none; background: transparent; color: var(--text-secondary); font-size: 13px; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s ease; }
        .tab-btn.active { background: rgba(0,113,227,0.1); color: var(--accent); }

        .scroller-content { flex: 1; overflow-y: auto; padding: 8px; display: none; }
        .scroller-content.active { display: block; }

        /* Элементы списков */
        .item-row { display: flex; align-items: center; padding: 12px; border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s ease; margin-bottom: 4px; }
        .item-row:hover { background: rgba(142,142,147,0.08); }
        .item-row.active { background: rgba(0,113,227,0.08); }
        
        .avatar-container { position: relative; margin-right: 12px; flex-shrink: 0; }
        .avatar-ui { width: 48px; height: 48px; border-radius: 50%; color: white; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 16px; shadow: var(--shadow-sm); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--bg-main); position: absolute; bottom: 0; right: 0; background: #8e8e93; }
        .status-dot.online { background: #34c759; }

        .row-meta { flex: 1; min-width: 0; }
        .row-flex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
        .row-title { font-weight: 600; font-size: 15px; color: var(--text-primary); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .row-time { font-size: 11px; color: var(--text-secondary); }
        .row-sub { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Окно чата компоненты */
        .chat-header { padding: 14px 20px; background: var(--panel-bg); border-bottom: 1px solid var(--panel-border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; z-index: 20; }
        .chat-header-left { display: flex; align-items: center; min-width: 0; }
        .chat-header-right { display: flex; gap: 8px; flex-shrink: 0; }
        
        .chat-messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }

        /* Пузыри сообщений */
        .msg-container { display: flex; flex-direction: column; max-width: 75%; position: relative; animation: msgIn 0.2s cubic-bezier(0.1, 0.8, 0.2, 1); }
        @keyframes msgIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-container.incoming { align-self: flex-start; }
        .msg-container.outgoing { align-self: flex-end; }
        
        .msg-bubble-main { padding: 10px 14px; border-radius: var(--radius-md); font-size: 14.5px; line-height: 1.4; box-shadow: var(--shadow-sm); word-break: break-word; }
        .incoming .msg-bubble-main { background: var(--bubble-in); color: var(--text-primary); border: 1px solid var(--panel-border); border-top-left-radius: 4px; }
        .outgoing .msg-bubble-main { background: var(--bubble-out); color: var(--bubble-out-text); border-top-right-radius: 4px; }
        .msg-footer-info { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 10px; margin-top: 3px; opacity: 0.6; }

        /* Инпуты */
        .chat-input-bar { padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); background: var(--panel-bg); border-top: 1px solid var(--panel-border); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; flex-direction: column; gap: 6px; }
        .input-row-container { display: flex; align-items: center; gap: 8px; }
        .chat-input-bar input { flex: 1; padding: 12px 16px; border: 1px solid var(--panel-border); border-radius: var(--radius-md); background: rgba(142,142,147,0.06); color: var(--text-primary); font-size: 15px; outline: none; }
        
        .circle-action-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(142,142,147,0.1); color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .circle-action-btn.primary { background: var(--accent-gradient); color: white; }
        .mobile-back-trigger { display: none; background: transparent; border: none; color: var(--accent); padding-right: 8px; cursor: pointer; align-items: center; justify-content: center; }

        /* Заглушка пустого чата */
        .empty-chat-stub { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); text-align: center; padding: 20px; }
        .empty-chat-stub svg { width: 64px; height: 64px; margin-bottom: 12px; opacity: 0.2; }

        /* Авторизация */
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .auth-overlay.active { opacity: 1; pointer-events: auto; }
        .auth-card { width: 90%; max-width: 380px; padding: 28px; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); backdrop-filter: blur(20px); }
        .form-field { width: 100%; padding: 12px; background: rgba(142,142,147,0.08); border: 1px solid var(--panel-border); border-radius: var(--radius-sm); color: var(--text-primary); outline: none; margin-bottom: 12px; font-size: 14px; }
        .action-button { width: 100%; padding: 12px; background: var(--accent-gradient); border: none; border-radius: var(--radius-md); color: white; font-weight: 600; cursor: pointer; font-size: 15px; }
        .auth-toggle-link { text-align: center; font-size: 13px; color: var(--accent); margin-top: 14px; cursor: pointer; }

        /* 👑 ИНТЕРФЕЙС ВИДЕОЗВОНКОВ (ОКНА И МОДАЛКИ) */
        #video-call-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
            background: #000; z-index: 500; display: none; flex-direction: column; justify-content: space-between;
        }
        #video-call-overlay.active { display: flex; }
        
        .remote-video-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .local-video-frame { position: absolute; top: 20px; right: 20px; width: 110px; height: 160px; object-fit: cover; z-index: 5; border-radius: var(--radius-md); box-shadow: 0 4px 20px rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.2); }
        
        .call-controls-bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 16px; background: rgba(0,0,0,0.5); padding: 12px 24px; border-radius: 40px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .call-btn { width: 50px; height: 50px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-size: 18px; }
        .call-btn.hangup { background: #ff3b30; }
        .call-btn.toggle { background: rgba(255,255,255,0.2); }

        #incoming-call-modal { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%); width: 90%; max-width: 400px; background: rgba(28,28,30,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-lg); box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 600; padding: 16px; display: flex; align-items: center; justify-content: space-between; color: white; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: transform 0.4s cubic-bezier(0.1, 0.8, 0.2, 1); }
        #incoming-call-modal.active { transform: translateX(-50%) translateY(0); }
        .incoming-call-actions { display: flex; gap: 8px; }
        .inc-btn { border: none; padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-size: 13px; }
        .inc-btn.accept { background: #34c759; color: white; }
        .inc-btn.decline { background: #ff3b30; color: white; }
    </style>
</head>
<body>

    <div id="auth-screen-layer" class="auth-overlay active">
        <div class="auth-card" id="auth-injector-node"></div>
    </div>

    <div id="video-call-overlay">
        <video id="remote-video-node" class="remote-video-frame" autoplay playsinline></video>
        <video id="local-video-node" class="local-video-frame" autoplay playsinline muted></video>
        <div class="call-controls-bar">
            <button class="call-btn toggle" onclick="toggleLocalVideoMute()" title="Камера">📷</button>
            <button class="call-btn hangup" onclick="endCurrentActiveCallSession()" title="Положить трубку">📞</button>
        </div>
    </div>

    <div id="incoming-call-modal">
        <div>
            <div style="font-weight:700; font-size:15px;" id="incoming-caller-name">Входящий вызов...</div>
            <div style="font-size:12px; color:#8e8e93;">Видеозвонок Коллаж</div>
        </div>
        <div class="incoming-call-actions">
            <button class="inc-btn decline" onclick="declineIncomingCallSession()">Отклонить</button>
            <button class="inc-btn accept" onclick="acceptIncomingCallSession()">Ответить</button>
        </div>
    </div>

    <div id="app-layout">
        
        <aside id="sidebar-container">
            <div class="sidebar-header">
                <span class="brand-title">Коллаж Сеть</span>
                <div id="my-avatar-anchor"></div>
            </div>
            <div class="search-box">
                <div class="search-inner">
                    <input type="text" id="global-search-input" placeholder="Поиск людей..." oninput="triggerGlobalSearchFlow()">
                </div>
            </div>
            <nav class="tab-bar">
                <button class="tab-btn active" id="tab-btn-chats" onclick="switchSidebarTab('chats')">Чаты</button>
                <button class="tab-btn" id="tab-btn-contacts" onclick="switchSidebarTab('contacts')">Контакты</button>
            </nav>
            <div id="tab-content-chats" class="scroller-content active"></div>
            <div id="tab-content-contacts" class="scroller-content"></div>
        </aside>

        <main id="main-chat-container">
            <div id="active-chat-subsystem" style="display:none; flex-direction:column; height:100%;">
                <header class="chat-header">
                    <div class="chat-header-left">
                        <button class="mobile-back-trigger" onclick="exitActiveChatView()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <div id="active-chat-avatar-slot"></div>
                        <div style="margin-left:12px; min-width:0;">
                            <div class="row-title" id="active-chat-name-target">...</div>
                            <div class="row-sub" id="active-chat-status-target">загрузка...</div>
                        </div>
                    </div>
                    <div class="chat-header-right">
                        <button class="circle-action-btn primary" onclick="initiateOutgoingVideoCall()" title="Видеозвонок">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                        </button>
                    </div>
                </header>

                <div class="chat-messages-area" id="chat-messages-flow-root"></div>

                <footer class="chat-input-bar">
                    <div class="input-row-container">
                        <input type="text" id="chat-core-input-field" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') dispatchMessagePacket()">
                        <button class="circle-action-btn primary" onclick="dispatchMessagePacket()">➔</button>
                    </div>
                </footer>
            </div>

            <div id="empty-chat-stub-layer" class="empty-chat-stub">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <h3>Выберите сотрудника</h3>
                <p style="font-size:13px; color:var(--text-secondary); margin-top:4px;">Интерфейс оптимизирован под iOS и Android</p>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIZhTEWNTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com",
            projectId: "yw-83b3e",
            storageBucket: "yw-83b3e.firebasestorage.app",
            messagingSenderId: "513977614231",
            appId: "1:513977614231:web:0a04427784e8259fdeced2"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUserId = localStorage.getItem('premium_session_uid') || null;
        let allUsers = [];
        let activeTab = 'chats';
        let activeChatTargetId = null;
        let isRegisterViewMode = false;
        let localSearchQuery = "";

        // ПЕРЕМЕННЫЕ ДЛЯ СТРУКТУРЫ ЗВОНКА (WebRTC Engine)
        let localStream = null;
        let remoteStream = null;
        let peerConnection = null;
        let currentCallRef = null;
        const rtcIceConfig = { iceServers: [{ urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }] };

        window.addEventListener('DOMContentLoaded', () => { initializeAppArchitecture(); });

        function initializeAppArchitecture() {
            database.ref('users').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                allUsers = Object.values(data);
                buildAppUIRenderers();
                listenIncomingCallsSubsystem();
            });

            if (currentUserId) {
                document.getElementById('auth-screen-layer').classList.remove('active');
            } else {
                drawAuthFormController();
            }
        }

        function buildAppUIRenderers() {
            renderMyAvatarHeader();
            if (activeTab === 'chats') renderChatsTabSubsystem();
            if (activeTab === 'contacts') renderContactsTabSubsystem();
            if (activeChatTargetId) updateActiveChatHeaderState();
        }

        function drawAuthFormController() {
            const root = document.getElementById('auth-injector-node');
            if(!isRegisterViewMode) {
                root.innerHTML = `
                    <h2 style="margin-bottom:8px;">Вход в сеть</h2>
                    <input type="text" id="f-login" class="form-field" placeholder="Логин">
                    <input type="password" id="f-pass" class="form-field" placeholder="Пароль">
                    <button class="action-button" onclick="executeLoginFlow()">Войти</button>
                    <div class="auth-toggle-link" onclick="toggleAuthView(true)">Регистрация профиля</div>
                `;
            } else {
                root.innerHTML = `
                    <h2 style="margin-bottom:8px;">Регистрация</h2>
                    <input type="text" id="f-reg-login" class="form-field" placeholder="Логин">
                    <input type="text" id="f-reg-name" class="form-field" placeholder="Имя">
                    <input type="text" id="f-reg-role" class="form-field" placeholder="Роль / Отдел">
                    <input type="password" id="f-reg-pass" class="form-field" placeholder="Пароль">
                    <button class="action-button" onclick="executeRegistrationFlow()">Создать</button>
                    <div class="auth-toggle-link" onclick="toggleAuthView(false)">Назад на вход</div>
                `;
            }
        }

        function toggleAuthView(mode) { isRegisterViewMode = mode; drawAuthFormController(); }

        function executeRegistrationFlow() {
            const login = document.getElementById('f-reg-login').value.trim().toLowerCase();
            const name = document.getElementById('f-reg-name').value.trim();
            const role = document.getElementById('f-reg-role').value.trim();
            const pass = document.getElementById('f-reg-pass').value.trim();
            if(!login || !name || !role || !pass) return;

            const uid = "uid_" + Date.now();
            const colors = ["#0071e3", "#ff2d55", "#34c759", "#ff9500", "#af52de"];
            const color = colors[Math.floor(Math.random() * colors.length)];

            const packet = { id: uid, login, name, role, pass, color, status: 'online' };
            database.ref('users/' + uid).set(packet).then(() => {
                currentUserId = uid;
                localStorage.setItem('premium_session_uid', uid);
                document.getElementById('auth-screen-layer').classList.remove('active');
            });
        }

        function executeLoginFlow() {
            const login = document.getElementById('f-login').value.trim().toLowerCase();
            const pass = document.getElementById('f-pass').value.trim();
            const matched = allUsers.find(u => u.login === login && u.pass === pass);
            if(!matched) { alert('Ошибка входа'); return; }

            currentUserId = matched.id;
            localStorage.setItem('premium_session_uid', matched.id);
            document.getElementById('auth-screen-layer').classList.remove('active');
            buildAppUIRenderers();
        }

        function generateInitialsUI(nameStr) {
            return nameStr ? nameStr.substring(0,2).toUpperCase() : "??";
        }

        function switchSidebarTab(tabTarget) {
            activeTab = tabTarget;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-btn-' + tabTarget).classList.add('active');
            buildAppUIRenderers();
        }

        function renderMyAvatarHeader() {
            const me = allUsers.find(u => u.id === currentUserId);
            if(!me) return;
            document.getElementById('my-avatar-anchor').innerHTML = `<div class="avatar-ui" style="background:${me.color}; width:34px; height:34px; font-size:12px;">${generateInitialsUI(me.name)}</div>`;
        }

        function renderContactsTabSubsystem() {
            const root = document.getElementById('tab-content-contacts');
            root.className = "scroller-content active";
            document.getElementById('tab-content-chats').className = "scroller-content";
            root.innerHTML = '';
            
            allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                const row = document.createElement('div');
                row.className = `item-row ${activeChatTargetId === u.id ? 'active' : ''}`;
                row.onclick = () => openActiveChatWindowWith(u.id);
                row.innerHTML = `
                    <div class="avatar-container">
                        <div class="avatar-ui" style="background:${u.color}">${generateInitialsUI(u.name)}</div>
                    </div>
                    <div class="row-meta">
                        <div class="row-flex-header"><span class="row-title">${u.name}</span></div>
                        <div class="row-sub">${u.role}</div>
                    </div>
                `;
                root.appendChild(row);
            });
        }

        function renderChatsTabSubsystem() {
            const root = document.getElementById('tab-content-chats');
            root.className = "scroller-content active";
            document.getElementById('tab-content-contacts').className = "scroller-content";
            root.innerHTML = '';

            database.ref('messages').once('value', (snapshot) => {
                const allMsgs = snapshot.val() || {};
                allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                    const chatKey = [currentUserId, u.id].sort().join('__');
                    if(!allMsgs[chatKey]) return;

                    const row = document.createElement('div');
                    row.className = `item-row ${activeChatTargetId === u.id ? 'active' : ''}`;
                    row.onclick = () => openActiveChatWindowWith(u.id);
                    row.innerHTML = `
                        <div class="avatar-container">
                            <div class="avatar-ui" style="background:${u.color}">${generateInitialsUI(u.name)}</div>
                        </div>
                        <div class="row-meta">
                            <div class="row-flex-header"><span class="row-title">${u.name}</span></div>
                            <div class="row-sub">Открыть историю сообщений</div>
                        </div>
                    `;
                    root.appendChild(row);
                });
            });
        }

        let messagesListenerRef = null;

        function openActiveChatWindowWith(targetId) {
            activeChatTargetId = targetId;
            document.getElementById('empty-chat-stub-layer').style.display = 'none';
            document.getElementById('active-chat-subsystem').style.display = 'flex';
            
            // Включаем класс-триггер сдвига окон для мобильных девайсов!
            document.getElementById('app-layout').classList.add('chat-opened');

            buildAppUIRenderers();

            const chatKey = [currentUserId, targetId].sort().join('__');
            if(messagesListenerRef) messagesListenerRef.off();
            
            messagesListenerRef = database.ref('messages/' + chatKey);
            messagesListenerRef.on('value', (snapshot) => {
                const data = snapshot.val() || {};
                const list = Object.keys(data).map(k => data[k]);
                renderMessagesFlowLayout(list);
            });
        }

        function updateActiveChatHeaderState() {
            const target = allUsers.find(u => u.id === activeChatTargetId);
            if(!target) return;
            document.getElementById('active-chat-name-target').innerText = target.name;
            document.getElementById('active-chat-status-target').innerText = target.role;
            document.getElementById('active-chat-avatar-slot').innerHTML = `<div class="avatar-ui" style="background:${target.color}; width:38px; height:38px; font-size:13px;">${generateInitialsUI(target.name)}</div>`;
        }

        function renderMessagesFlowLayout(list) {
            const flow = document.getElementById('chat-messages-flow-root');
            flow.innerHTML = '';
            list.forEach(m => {
                const isMe = m.senderId === currentUserId;
                const container = document.createElement('div');
                container.className = `msg-container ${isMe ? 'outgoing' : 'incoming'}`;
                container.innerHTML = `
                    <div class="msg-bubble-main">
                        <div>${m.text}</div>
                        <div class="msg-footer-info"><span>${m.time}</span></div>
                    </div>
                `;
                flow.appendChild(container);
            });
            flow.scrollTop = flow.scrollHeight;
        }

        function dispatchMessagePacket() {
            const input = document.getElementById('chat-core-input-field');
            const txt = input.value.trim();
            if(!txt) return;

            const chatKey = [currentUserId, activeChatTargetId].sort().join('__');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            database.ref('messages/' + chatKey).push({
                senderId: currentUserId,
                text: txt,
                time: time
            });
            input.value = '';
        }

        function exitActiveChatView() {
            document.getElementById('app-layout').classList.remove('chat-opened');
            activeChatTargetId = null;
        }

        function triggerGlobalSearchFlow() {
            // Заглушка базовой фильтрации
        }


        // =========================================================================
        // 👑 ЯДРО СИСТЕМЫ ВИДЕОЗВОНКОВ (WebRTC Signaling Pipeline via Firebase)
        // =========================================================================

        function listenIncomingCallsSubsystem() {
            if (!currentUserId) return;
            // Слушаем узел звонков в реальном времени
            database.ref('calls').on('value', async (snapshot) => {
                const data = snapshot.val() || {};
                for (let key in data) {
                    const callObj = data[key];
                    // Если звонят мне и статус звонка "создан" (ringing)
                    if (callObj.calleeId === currentUserId && callObj.status === 'ringing') {
                        currentCallRef = database.ref('calls/' + key);
                        const caller = allUsers.find(u => u.id === callObj.callerId);
                        document.getElementById('incoming-caller-name').innerText = caller ? `Звонит: ${caller.name}` : "Входящий вызов";
                        document.getElementById('incoming-call-modal').classList.add('active');
                        
                        // Слушаем сброс со стороны звонящего
                        currentCallRef.on('value', (innerSnap) => {
                            if(!innerSnap.exists() || innerSnap.val().status === 'ended') {
                                closeCallOverlayUI();
                            }
                        });
                        break;
                    }
                }
            });
        }

        async function initiateOutgoingVideoCall() {
            if (!activeChatTargetId) return;
            const chatKey = [currentUserId, activeChatTargetId].sort().join('__');
            currentCallRef = database.ref('calls/' + chatKey);

            document.getElementById('video-call-overlay').classList.add('active');

            // 1. Захватываем камеру и микрофон
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video-node').srcObject = localStream;

            // 2. Инициализируем соединение WebRTC PeerConnection
            peerConnection = new RTCPeerConnection(rtcIceConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (event) => {
                document.getElementById('remote-video-node').srcObject = event.streams[0];
            };

            // Собираем наши ICE-кандидаты и пишем в сеть
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    currentCallRef.child('callerCandidates').push(event.candidate.toJSON());
                }
            };

            // 3. Создаем SDP-оффер (предложение связи)
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            // Записываем структуру звонка в Firebase
            const callMeta = {
                id: chatKey,
                callerId: currentUserId,
                calleeId: activeChatTargetId,
                status: 'ringing',
                offer: { type: offer.type, sdp: offer.sdp }
            };
            await currentCallRef.set(callMeta);

            // 4. Слушаем ответ (Answer) от принимающей стороны
            currentCallRef.child('answer').on('value', async (snap) => {
                const answer = snap.val();
                if (answer && peerConnection.signalingState !== "stable") {
                    const rtcAnswer = new RTCSessionDescription(answer);
                    await peerConnection.setRemoteDescription(rtcAnswer);
                }
            });

            // Слушаем ICE кандидаты второй стороны
            currentCallRef.child('calleeCandidates').on('child_added', (snap) => {
                const data = snap.val();
                if (data && peerConnection) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(data));
                }
            });
        }

        async function acceptIncomingCallSession() {
            document.getElementById('incoming-call-modal').classList.remove('active');
            document.getElementById('video-call-overlay').classList.add('active');

            const snap = await currentCallRef.get();
            const callData = snap.val();

            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video-node').srcObject = localStream;

            peerConnection = new RTCPeerConnection(rtcIceConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (event) => {
                document.getElementById('remote-video-node').srcObject = event.streams[0];
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    currentCallRef.child('calleeCandidates').push(event.candidate.toJSON());
                }
            };

            // Устанавливаем присланный оффер
            await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
            
            // Создаем ответ (Answer)
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            await currentCallRef.update({
                status: 'connected',
                answer: { type: answer.type, sdp: answer.sdp }
            });

            // Принимаем кандидаты звонящего
            currentCallRef.child('callerCandidates').on('child_added', (cSnap) => {
                const data = cSnap.val();
                if (data && peerConnection) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(data));
                }
            });
        }

        function declineIncomingCallSession() {
            document.getElementById('incoming-call-modal').classList.remove('active');
            if (currentCallRef) {
                currentCallRef.update({ status: 'ended' });
                currentCallRef.remove();
            }
        }

        function endCurrentActiveCallSession() {
            if (currentCallRef) {
                currentCallRef.update({ status: 'ended' });
                currentCallRef.remove();
            }
            closeCallOverlayUI();
        }

        function closeCallOverlayUI() {
            document.getElementById('video-call-overlay').classList.remove('active');
            document.getElementById('incoming-call-modal').classList.remove('active');
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
        }

        function toggleLocalVideoMute() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                videoTrack.enabled = !videoTrack.enabled;
            }
        }
    </script>
