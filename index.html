<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Collage Connect Premium</title>
    <style>
        :root {
            --bg-main: #f2f4f7;
            --panel-bg: rgba(255, 255, 255, 0.75);
            --panel-border: rgba(0, 0, 0, 0.06);
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --accent: #007at7;
            --accent-gradient: linear-gradient(135deg, #0071e3 0%, #34aadc 100%);
            --bubble-in: #ffffff;
            --bubble-out: #0071e3;
            --bubble-out-text: #ffffff;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 12px 30px rgba(0, 0, 0, 0.06);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 380px;
            --chat-wallpaper: linear-gradient(180deg, #f2f4f7 0%, #e5e9f0 100%);
        }

        [data-theme="dark"] {
            --bg-main: #0c0c0e;
            --panel-bg: rgba(22, 22, 26, 0.75);
            --panel-border: rgba(255, 255, 255, 0.06);
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --accent: #2997ff;
            --accent-gradient: linear-gradient(135deg, #2997ff 0%, #64d2ff 100%);
            --bubble-in: #1c1c1e;
            --bubble-out: #2997ff;
            --bubble-out-text: #ffffff;
            --shadow-md: 0 12px 40px rgba(0, 0, 0, 0.3);
            --chat-wallpaper: linear-gradient(180deg, #0c0c0e 0%, #16161a 100%);
        }

        /* Системные обои */
        .wp-pattern-1 { --chat-wallpaper: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .wp-pattern-2 { --chat-wallpaper: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); }
        .wp-pattern-3 { --chat-wallpaper: #111a24; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body, html { width: 100%; height: 100dvh; background: var(--bg-main); color: var(--text-primary); overflow: hidden; }

        /* ОСНОВНАЯ СЕТКА (Двухпанельная для ПК, Однопанельная для Мобильных) */
        #app-layout {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            background: var(--bg-main);
        }

        /* ЛЕВАЯ ПАНЕЛЬ (САЙДБАР) */
        #sidebar-container {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--panel-bg);
            border-right: 1px solid var(--panel-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            z-index: 30;
            transition: var(--transition);
        }

        /* ПРАВАЯ ПАНЕЛЬ (ОКНО ЧАТА) */
        #main-chat-container {
            flex: 1;
            height: 100%;
            background: var(--chat-wallpaper);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            transition: var(--transition);
        }

        /* Экран авторизации */
        .auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main); z-index: 999; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .auth-overlay.active { opacity: 1; pointer-events: auto; }
        .auth-card {
            width: 100%; max-width: 400px; padding: 32px; background: var(--panel-bg);
            border: 1px solid var(--panel-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            transform: translateY(20px); transition: var(--transition);
        }
        .auth-overlay.active .auth-card { transform: translateY(0); }

        /* Верхняя плашка сайдбара с профилем */
        .sidebar-header {
            padding: 20px 16px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand-title { font-size: 22px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-box {
            padding: 0 16px 12px;
        }
        .search-inner {
            display: flex; align-items: center; background: rgba(142,142,147,0.12); padding: 8px 12px; border-radius: var(--radius-sm);
        }
        .search-inner input { border: none; background: transparent; outline: none; width: 100%; margin-left: 8px; color: var(--text-primary); font-size: 14px; }

        /* Навигация по вкладкам (Сверху сайдбара) */
        .tab-bar {
            display: flex; padding: 0 12px 10px; border-bottom: 1px solid var(--panel-border); gap: 4px;
        }
        .tab-btn {
            flex: 1; padding: 8px; border: none; background: transparent; color: var(--text-secondary);
            font-size: 13px; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
        }
        .tab-btn.active { background: rgba(0,113,227,0.1); color: var(--accent); }

        /* Списки контента */
        .scroller-content { flex: 1; overflow-y: auto; padding: 8px; display: none; }
        .scroller-content.active { display: block; }

        /* Элементы списков */
        .item-row {
            display: flex; align-items: center; padding: 12px; border-radius: var(--radius-md);
            cursor: pointer; transition: var(--transition); margin-bottom: 4px; position: relative;
        }
        .item-row:hover { background: rgba(142,142,147,0.08); }
        .item-row.active { background: rgba(0,113,227,0.08); }
        
        .avatar-container { position: relative; margin-right: 12px; }
        .avatar-ui { width: 48px; height: 48px; border-radius: 50%; color: white; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: var(--shadow-sm); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--bg-main); position: absolute; bottom: 0; right: 0; background: #8e8e93; }
        .status-dot.online { background: #34c759; }
        .status-dot.away { background: #ff9500; }
        .status-dot.dnd { background: #ff3b30; }

        .row-meta { flex: 1; min-width: 0; }
        .row-flex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
        .row-title { font-weight: 600; font-size: 15px; color: var(--text-primary); }
        .row-time { font-size: 11px; color: var(--text-secondary); }
        .row-sub { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .unread-badge { background: var(--accent); color: white; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center; }

        /* Окно чата компоненты */
        .chat-header {
            padding: 14px 20px; background: var(--panel-bg); border-bottom: 1px solid var(--panel-border);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between; z-index: 20;
        }
        .chat-header-left { display: flex; align-items: center; }
        
        .chat-messages-area {
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
            background: var(--chat-wallpaper);
        }

        /* Пузыри сообщений */
        .msg-container { display: flex; flex-direction: column; max-width: 65%; animation: slideUp 0.25s cubic-bezier(0.1, 0.8, 0.2, 1); position: relative; group: hover; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-container.incoming { align-self: flex-start; }
        .msg-container.outgoing { align-self: flex-end; }

        .msg-sender-name { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 2px; padding-left: 4px; }
        
        .msg-bubble-main {
            padding: 10px 14px; border-radius: var(--radius-md); font-size: 14.5px; line-height: 1.45;
            box-shadow: var(--shadow-sm); position: relative; word-break: break-word;
        }
        .incoming .msg-bubble-main { background: var(--bubble-in); color: var(--text-primary); border: 1px solid var(--panel-border); border-top-left-radius: 4px; }
        .outgoing .msg-bubble-main { background: var(--bubble-out); color: var(--bubble-out-text); border-top-right-radius: 4px; }

        .msg-footer-info { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 10px; margin-top: 3px; opacity: 0.7; }
        .outgoing .msg-footer-info { color: rgba(255,255,255,0.8); }
        .incoming .msg-footer-info { color: var(--text-secondary); }

        /* Контекстные действия над сообщением (появляются при наведении) */
        .msg-actions {
            position: absolute; top: -12px; display: none; background: var(--panel-bg); border: 1px solid var(--panel-border);
            border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); padding: 2px; gap: 2px; z-index: 50;
        }
        .msg-container:hover .msg-actions { display: flex; }
        .incoming .msg-actions { right: -70px; }
        .outgoing .msg-actions { left: -70px; }
        
        .msg-act-btn { border: none; background: transparent; padding: 4px 6px; font-size: 11px; cursor: pointer; border-radius: 6px; color: var(--text-primary); }
        .msg-act-btn:hover { background: rgba(142,142,147,0.15); }

        /* Блок цитирования внутри сообщения */
        .quote-reply-zone {
            background: rgba(0, 0, 0, 0.05); border-left: 3px solid var(--accent); padding: 4px 8px; border-radius: 4px; margin-bottom: 6px; font-size: 12px; opacity: 0.9;
        }
        .outgoing .quote-reply-zone { background: rgba(255,255,255,0.15); border-left-color: #fff; }

        /* Ввод сообщений */
        .chat-input-bar {
            padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
            background: var(--panel-bg); border-top: 1px solid var(--panel-border);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column; gap: 6px; z-index: 20;
        }
        .input-row-container { display: flex; align-items: center; gap: 10px; }
        .chat-input-bar input {
            flex: 1; padding: 12px 16px; border: 1px solid var(--panel-border); border-radius: var(--radius-md);
            background: rgba(142,142,147,0.06); color: var(--text-primary); font-size: 14.5px; outline: none; transition: var(--transition);
        }
        .chat-input-bar input:focus { border-color: var(--accent); background: rgba(255,255,255,0.01); }

        .circle-action-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(142,142,147,0.1);
            color: var(--text-primary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition);
        }
        .circle-action-btn:hover { background: rgba(142,142,147,0.2); transform: scale(1.05); }
        .circle-action-btn.primary { background: var(--accent-gradient); color: white; }

        /* Панель ответа перед инпутом */
        .active-reply-indicator {
            display: none; align-items: center; justify-content: space-between; background: rgba(142,142,147,0.08); padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px;
        }
        .active-reply-indicator.visible { display: flex; }

        /* Индикатор того, что кто-то печатает */
        .typing-indicator-node {
            font-size: 12px; color: var(--text-secondary); italic; display: none; padding-left: 4px; margin-top: 2px;
        }
        .typing-indicator-node.active { display: block; }

        /* Настройки стили */
        .settings-box-group { background: rgba(142,142,147,0.05); border-radius: var(--radius-md); padding: 8px; margin-bottom: 16px; border: 1px solid var(--panel-border); }
        .setting-control-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 8px; }
        .setting-control-row:not(:last-child) { border-bottom: 1px solid var(--panel-border); }
        .setting-control-row label { font-size: 14.5px; font-weight: 500; }
        
        .ui-select { padding: 6px 10px; border-radius: 8px; background: var(--bg-main); color: var(--text-primary); border: 1px solid var(--panel-border); outline: none; }
        .ui-btn-danger { width: 100%; padding: 12px; border: none; background: #ff3b30; color: white; font-weight: 600; border-radius: var(--radius-md); cursor: pointer; margin-top: 10px; }

        /* Кнопка назад для мобилок */
        .mobile-back-trigger { display: none; margin-right: 12px; background: transparent; border: none; color: var(--accent); font-size: 16px; align-items: center; cursor: pointer; }

        /* Заглушка пустого чата */
        .empty-chat-stub {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); text-align: center; padding: 20px;
        }
        .empty-chat-stub svg { width: 64px; height: 64px; margin-bottom: 12px; opacity: 0.3; }

        /* РЕСПОНСИВ-АДАПТИВ (ДЛЯ СМАРТФОНОВ) */
        @media (max-width: 768px) {
            #sidebar-container { width: 100%; position: absolute; top: 0; left: 0; }
            #main-chat-container { width: 100%; position: absolute; top: 0; left: 0; transform: translateX(100%); z-index: 40; }
            #app-layout.chat-opened #main-chat-container { transform: translateX(0); }
            .mobile-back-trigger { display: flex; }
        }

        /* Утилитарные инпуты */
        .form-field { width: 100%; padding: 10px 12px; background: rgba(142,142,147,0.08); border: 1px solid var(--panel-border); border-radius: var(--radius-sm); color: var(--text-primary); outline: none; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div id="auth-screen-layer" class="auth-overlay active">
        <div class="auth-card" id="auth-injector-node"></div>
    </div>

    <div id="app-layout">
        
        <aside id="sidebar-container">
            <div class="sidebar-header">
                <span class="brand-title">Коллаж Сеть</span>
                <div id="my-avatar-anchor"></div>
            </div>

            <div class="search-box">
                <div class="search-inner">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--text-secondary);"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="global-search-input" placeholder="Поиск сообщений и людей..." oninput="triggerGlobalSearchFlow()">
                </div>
            </div>

            <nav class="tab-bar">
                <button class="tab-btn active" id="tab-btn-chats" onclick="switchSidebarTab('chats')">Чаты</button>
                <button class="tab-btn" id="tab-btn-contacts" onclick="switchSidebarTab('contacts')">Контакты</button>
                <button class="tab-btn" id="tab-btn-settings" onclick="switchSidebarTab('settings')">Настройки</button>
            </nav>

            <div id="tab-content-chats" class="scroller-content active"></div>
            <div id="tab-content-contacts" class="scroller-content"></div>
            <div id="tab-content-settings" class="scroller-content">
                <div style="padding: 10px;">
                    <h4 style="margin-bottom:10px; font-size:14px; text-transform:uppercase; color:var(--text-secondary)">Мой Профиль</h4>
                    <div class="settings-box-group">
                        <div class="setting-control-row"><label>Имя</label><input type="text" id="set-my-name" class="form-field" style="margin:0; width:65%;" onchange="pushProfileUpdateToServer()"></div>
                        <div class="setting-control-row"><label>Статус</label>
                            <select id="set-my-status" class="ui-select" onchange="pushProfileUpdateToServer()">
                                <option value="online">🟢 В сети</option>
                                <option value="away">🟡 Отошел</option>
                                <option value="dnd">🔴 Не беспокоить</option>
                            </select>
                        </div>
                    </div>

                    <h4 style="margin-bottom:10px; font-size:14px; text-transform:uppercase; color:var(--text-secondary)">Внешний вид</h4>
                    <div class="settings-box-group">
                        <div class="setting-control-row"><label>Тема оформления</label>
                            <select id="set-app-theme" class="ui-select" onchange="modifyThemeContext(this.value)">
                                <option value="light">Светлая элитная</option>
                                <option value="dark">Глубокая ночная</option>
                            </select>
                        </div>
                        <div class="setting-control-row"><label>Обои чата</label>
                            <select id="set-chat-wp" class="ui-select" onchange="modifyWallpaperContext(this.value)">
                                <option value="default">Стандартный градиент</option>
                                <option value="wp-pattern-1">Небесный рассвет</option>
                                <option value="wp-pattern-2">Неоновая лаванда</option>
                                <option value="wp-pattern-3">Темный космос</option>
                            </select>
                        </div>
                    </div>

                    <h4 style="margin-bottom:10px; font-size:14px; text-transform:uppercase; color:var(--text-secondary)">Система</h4>
                    <div class="settings-box-group">
                        <div class="setting-control-row"><label>Звуки чата</label><input type="checkbox" id="set-sound-toggle" checked></div>
                        <button class="ui-btn-danger" style="background: rgba(142,142,147,0.15); color: var(--text-primary);" onclick="exportChatHistoryJSON()">Экспорт истории (JSON)</button>
                        <button class="ui-btn-danger" onclick="logOutSession()">Выйти из профиля</button>
                    </div>
                </div>
            </div>
        </aside>

        <main id="main-chat-container">
            <div id="active-chat-subsystem" style="display:none; flex-direction:column; height:100%;">
                
                <header class="chat-header">
                    <div class="chat-header-left">
                        <button class="mobile-back-trigger" onclick="exitActiveChatView()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <div id="active-chat-avatar-slot"></div>
                        <div style="margin-left:12px;">
                            <div class="row-title" id="active-chat-name-target">...</div>
                            <div class="row-sub" id="active-chat-status-target">загрузка...</div>
                            <div class="typing-indicator-node" id="typing-indicator-root">печатает сообщение...</div>
                        </div>
                    </div>
                    <div>
                        <button class="circle-action-btn" onclick="clearCurrentChatHistoryInCloud()" title="Очистить историю чата"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                    </div>
                </header>

                <div class="chat-messages-area" id="chat-messages-flow-root"></div>

                <footer class="chat-input-bar">
                    <div class="active-reply-indicator" id="reply-indicator-node">
                        <span id="reply-indicator-text-node">Ответ на сообщение...</span>
                        <span style="color:var(--accent); cursor:pointer; font-weight:700;" onclick="cancelActiveReplyState()">✕</span>
                    </div>
                    <div class="input-row-container">
                        <button class="circle-action-btn" onclick="simulateMediaPayloadDispatch()" title="Прикрепить код / картинку"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                        <input type="text" id="chat-core-input-field" placeholder="Напишите сообщение..." oninput="handleLocalUserTypingEvent()" onkeypress="if(event.key==='Enter') dispatchMessagePacket()">
                        <button class="circle-action-btn primary" onclick="dispatchMessagePacket()"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></button>
                    </div>
                </footer>

            </div>

            <div id="empty-chat-stub-layer" class="empty-chat-stub">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <h3>Выберите чат, чтобы начать общение</h3>
                <p style="font-size:13px; color:var(--text-secondary); margin-top:4px;">Все сессии и данные шифруются на сервере Firebase</p>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Инициализация твоей личной БД Firebase со скриншота!
        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIZhTEWNTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com",
            projectId: "yw-83b3e",
            storageBucket: "yw-83b3e.firebasestorage.app",
            messagingSenderId: "513977614231",
            appId: "1:513977614231:web:0a04427784e8259fdeced2"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // СТЕЙТ ПРИЛОЖЕНИЯ (State Management Engine)
        let currentUserId = localStorage.getItem('premium_session_uid') || null;
        let allUsers = [];
        let activeTab = 'chats';
        let activeChatTargetId = null;
        let isRegisterViewMode = false;
        let activeReplyMsgId = null;
        let editingMessageId = null;
        let typingTimeoutTimer = null;
        let localSearchQuery = "";

        // Аудиоэффекты
        const soundIn = new Audio('https://assets.mixkit.co/active_storage/sfx/2357/2357-84.wav');
        const soundOut = new Audio('https://assets.mixkit.co/active_storage/sfx/2353/2353-84.wav');
        soundIn.volume = 0.3; soundOut.volume = 0.2;

        window.addEventListener('DOMContentLoaded', () => { initializeAppArchitecture(); });

        function initializeAppArchitecture() {
            syncThemeAndPreferences();
            
            // Realtime Sync пользователей из базы данных
            database.ref('users').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                allUsers = Object.values(data);
                buildAppUIRenderers();
            });

            if (currentUserId) {
                document.getElementById('auth-screen-layer').classList.remove('active');
                setUserOnlineNetworkStatus('online');
            } else {
                drawAuthFormController();
            }
        }

        function syncThemeAndPreferences() {
            const currentTheme = localStorage.getItem('set_theme') || 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            document.getElementById('set-app-theme').value = currentTheme;

            const currentWp = localStorage.getItem('set_wp') || 'default';
            document.getElementById('main-chat-container').className = '';
            if(currentWp !== 'default') document.getElementById('main-chat-container').classList.add(currentWp);
            document.getElementById('set-chat-wp').value = currentWp;
        }

        // РЕНДЕРЕРЫ ИНТЕРФЕЙСА (UI Render Pipeline)
        function buildAppUIRenderers() {
            renderMyAvatarHeader();
            if (activeTab === 'chats') renderChatsTabSubsystem();
            if (activeTab === 'contacts') renderContactsTabSubsystem();
            if (activeChatTargetId) updateActiveChatHeaderState();
        }

        function drawAuthFormController() {
            const root = document.getElementById('auth-injector-node');
            if(!isRegisterViewMode) {
                root.innerHTML = `
                    <h2>Рады видеть вас</h2>
                    <p>Введите корпоративные учетные данные</p>
                    <input type="text" id="f-login" class="form-field" placeholder="Уникальный Логин">
                    <input type="password" id="f-pass" class="form-field" placeholder="Пароль">
                    <button class="action-button" onclick="executeLoginFlow()">Войти в систему</button>
                    <div class="auth-toggle-link" onclick="toggleAuthView(true)">Создать новый корпоративный профиль</div>
                `;
            } else {
                root.innerHTML = `
                    <h2>Создать аккаунт</h2>
                    <p>Профиль будет доступен для всех терминалов</p>
                    <input type="text" id="f-reg-login" class="form-field" placeholder="Придумайте Логин">
                    <input type="text" id="f-reg-name" class="form-field" placeholder="Имя и Фамилия">
                    <input type="text" id="f-reg-role" class="form-field" placeholder="Должность (например, Дизайнер)">
                    <input type="password" id="f-reg-pass" class="form-field" placeholder="Пароль безопасности">
                    <button class="action-button" onclick="executeRegistrationFlow()">Завершить регистрацию</button>
                    <div class="auth-toggle-link" onclick="toggleAuthView(false)">Уже есть профиль? Выполнить вход</div>
                `;
            }
        }

        function toggleAuthView(mode) { isRegisterViewMode = mode; drawAuthFormController(); }

        // ЛОГИКА АВТОРИЗАЦИИ
        function executeRegistrationFlow() {
            const login = document.getElementById('f-reg-login').value.trim().toLowerCase();
            const name = document.getElementById('f-reg-name').value.trim();
            const role = document.getElementById('f-reg-role').value.trim();
            const pass = document.getElementById('f-reg-pass').value.trim();

            if(!login || !name || !role || !pass) { alert('Пожалуйста, заполните все поля.'); return; }
            if(allUsers.some(u => u.login === login)) { alert('Этот логин уже занят другим сотрудником.'); return; }

            const uid = "uid_" + Date.now();
            const hexColors = ["#0071e3", "#ff2d55", "#34c759", "#ff9500", "#af52de", "#5856d6"];
            const color = hexColors[Math.floor(Math.random() * hexColors.length)];

            const userPacket = { id: uid, login, name, role, pass, color, status: 'online' };
            
            database.ref('users/' + uid).set(userPacket).then(() => {
                currentUserId = uid;
                localStorage.setItem('premium_session_uid', uid);
                document.getElementById('auth-screen-layer').classList.remove('active');
                setUserOnlineNetworkStatus('online');
            });
        }

        function executeLoginFlow() {
            const login = document.getElementById('f-login').value.trim().toLowerCase();
            const pass = document.getElementById('f-pass').value.trim();

            const matched = allUsers.find(u => u.login === login && u.pass === pass);
            if(!matched) { alert('Неверная связка логина и пароля.'); return; }

            currentUserId = matched.id;
            localStorage.setItem('premium_session_uid', matched.id);
            document.getElementById('auth-screen-layer').classList.remove('active');
            setUserOnlineNetworkStatus('online');
        }

        function logOutSession() {
            setUserOnlineNetworkStatus('offline');
            localStorage.removeItem('premium_session_uid');
            currentUserId = null;
            document.getElementById('auth-screen-layer').classList.add('active');
            drawAuthFormController();
        }

        function setUserOnlineNetworkStatus(statusString) {
            if(currentUserId) {
                database.ref('users/' + currentUserId + '/status').set(statusString);
            }
        }

        // СЛУЖЕБНЫЕ МЕТОДЫ ИНТЕРФЕЙСА
        function generateInitialsUI(nameStr) {
            if(!nameStr) return "?";
            let parts = nameStr.split(' ');
            return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
        }

        function switchSidebarTab(tabTarget) {
            activeTab = tabTarget;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.scroller-content').forEach(c => c.classList.remove('active'));
            
            document.getElementById('tab-btn-' + tabTarget).classList.add('active');
            document.getElementById('tab-content-' + tabTarget).classList.add('active');

            if(tabTarget === 'settings') {
                const me = allUsers.find(u => u.id === currentUserId);
                if(me) {
                    document.getElementById('set-my-name').value = me.name;
                    document.getElementById('set-my-status').value = me.status || 'online';
                }
            }
            buildAppUIRenderers();
        }

        function renderMyAvatarHeader() {
            const me = allUsers.find(u => u.id === currentUserId);
            const anchor = document.getElementById('my-avatar-anchor');
            if(!me || !anchor) return;
            anchor.innerHTML = `<div class="avatar-ui" style="background:${me.color}; width:36px; height:36px; font-size:13px;">${generateInitialsUI(me.name)}</div>`;
        }

        function pushProfileUpdateToServer() {
            const name = document.getElementById('set-my-name').value.trim();
            const status = document.getElementById('set-my-status').value;
            if(name) {
                database.ref('users/' + currentUserId + '/name').set(name);
                database.ref('users/' + currentUserId + '/status').set(status);
            }
        }

        // РЕНДЕР ВКЛАДКИ КОНТАКТОВ
        function renderContactsTabSubsystem() {
            const root = document.getElementById('tab-content-contacts');
            root.innerHTML = '';
            
            const filtered = allUsers.filter(u => u.id !== currentUserId && (u.name.toLowerCase().includes(localSearchQuery) || u.role.toLowerCase().includes(localSearchQuery)));
            
            if(filtered.length === 0) {
                root.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-secondary); font-size:13px;">Контакты не найдены</div>`;
                return;
            }

            filtered.forEach(u => {
                const activeClass = activeChatTargetId === u.id ? 'active' : '';
                const row = document.createElement('div');
                row.className = `item-row ${activeClass}`;
                row.onclick = () => openActiveChatWindowWith(u.id);
                row.innerHTML = `
                    <div class="avatar-container">
                        <div class="avatar-ui" style="background:${u.color}">${generateInitialsUI(u.name)}</div>
                        <div class="status-dot ${u.status === 'online' ? 'online' : u.status === 'away' ? 'away' : u.status === 'dnd' ? 'dnd' : ''}"></div>
                    </div>
                    <div class="row-meta">
                        <div class="row-flex-header"><span class="row-title">${u.name}</span></div>
                        <div class="row-sub">${u.role}</div>
                    </div>
                `;
                root.appendChild(row);
            });
        }

        // РЕНДЕР ВКЛАДКИ АКТИВНЫХ ЧАТОВ
        function renderChatsTabSubsystem() {
            const root = document.getElementById('tab-content-chats');
            root.innerHTML = '';

            database.ref('messages').once('value', (snapshot) => {
                const allMsgs = snapshot.val() || {};
                let chatsRenderedCount = 0;

                allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                    const chatKey = [currentUserId, u.id].sort().join('__');
                    const history = allMsgs[chatKey] ? Object.values(allMsgs[chatKey]) : [];
                    if(history.length === 0) return;

                    chatsRenderedCount++;
                    const lastMsg = history[history.length - 1];
                    const activeClass = activeChatTargetId === u.id ? 'active' : '';

                    const row = document.createElement('div');
                    row.className = `item-row ${activeClass}`;
                    row.onclick = () => openActiveChatWindowWith(u.id);
                    row.innerHTML = `
                        <div class="avatar-container">
                            <div class="avatar-ui" style="background:${u.color}">${generateInitialsUI(u.name)}</div>
                            <div class="status-dot ${u.status === 'online' ? 'online' : u.status === 'away' ? 'away' : u.status === 'dnd' ? 'dnd' : ''}"></div>
                        </div>
                        <div class="row-meta">
                            <div class="row-flex-header">
                                <span class="row-title">${u.name}</span>
                                <span class="row-time">${lastMsg.time}</span>
                            </div>
                            <div class="row-sub">${lastMsg.text.startsWith('http') ? '📁 Изображение/Файл' : lastMsg.text}</div>
                        </div>
                    `;
                    root.appendChild(row);
                });

                if(chatsRenderedCount === 0) {
                    root.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-secondary); font-size:13px;">У вас пока нет активных диалогов.<br>Перейдите в "Контакты".</div>`;
                }
            });
        }

        // УПРАВЛЕНИЕ ОКНОМ ДИАЛОГА (Core Chat Engine)
        let messagesListenerRef = null;
        let typingListenerRef = null;

        function openActiveChatWindowWith(targetId) {
            activeChatTargetId = targetId;
            document.getElementById('empty-chat-stub-layer').style.display = 'none';
            document.getElementById('active-chat-subsystem').style.display = 'flex';
            document.getElementById('app-layout').classList.add('chat-opened');

            buildAppUIRenderers();
            cancelActiveReplyState();

            const chatKey = [currentUserId, targetId].sort().join('__');

            // Подключаем слушатель сообщений
            if(messagesListenerRef) messagesListenerRef.off();
            messagesListenerRef = database.ref('messages/' + chatKey);
            messagesListenerRef.on('value', (snapshot) => {
                const data = snapshot.val() || {};
                const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                renderMessagesFlowLayout(list);

                if(document.getElementById('set-sound-toggle').checked && list.length > 0) {
                    const last = list[list.length - 1];
                    if(last.senderId !== currentUserId) soundIn.play().catch(()=>{});
                }
            });

            // Подключаем слушатель статуса "печатает"
            if(typingListenerRef) typingListenerRef.off();
            typingListenerRef = database.ref('typing/' + chatKey + '/' + targetId);
            typingListenerRef.on('value', (snapshot) => {
                const isTyping = snapshot.val() || false;
                const node = document.getElementById('typing-indicator-root');
                if(isTyping) node.classList.add('active'); else node.classList.remove('active');
            });
        }

        function updateActiveChatHeaderState() {
            const target = allUsers.find(u => u.id === activeChatTargetId);
            if(!target) return;

            document.getElementById('active-chat-name-target').innerText = target.name;
            let statusText = target.status === 'online' ? '🟢 в сети' : target.status === 'away' ? '🟡 отошел' : target.status === 'dnd' ? '🔴 не беспокоить' : '⚫ не в сети';
            document.getElementById('active-chat-status-target').innerText = target.role + " • " + statusText;

            const slot = document.getElementById('active-chat-avatar-slot');
            slot.innerHTML = `<div class="avatar-ui" style="background:${target.color}; width:40px; height:40px; font-size:14px;">${generateInitialsUI(target.name)}</div>`;
        }

        function renderMessagesFlowLayout(msgList) {
            const flow = document.getElementById('chat-messages-flow-root');
            flow.innerHTML = '';

            msgList.forEach(m => {
                const isMe = m.senderId === currentUserId;
                const senderObj = allUsers.find(u => u.id === m.senderId);
                const senderName = senderObj ? senderObj.name : "Сотрудник";

                const container = document.createElement('div');
                container.className = `msg-container ${isMe ? 'outgoing' : 'incoming'}`;
                
                let replyMarkup = '';
                if(m.replyToText) {
                    replyMarkup = `<div class="quote-reply-zone"><b>${m.replyToSender}:</b> ${m.replyToText}</div>`;
                }

                let coreTextContent = m.text;
                if(m.text.startsWith('http') && (m.text.includes('.jpg') || m.text.includes('.png') || m.text.includes('.gif') || m.text.includes('unsplash'))) {
                    coreTextContent = `<img src="${m.text}" style="width:100%; max-width:240px; border-radius:8px; display:block; margin-top:4px;">`;
                }

                container.innerHTML = `
                    ${!isMe ? `<div class="msg-sender-name">${senderName}</div>` : ''}
                    <div class="msg-bubble-main">
                        ${replyMarkup}
                        <div>${coreTextContent}</div>
                        <div class="msg-footer-info">
                            <span>${m.time}</span>
                            ${m.edited ? '<span>(ред.)</span>' : ''}
                        </div>
                    </div>
                    <div class="msg-actions">
                        <button class="msg-act-btn" onclick="initiateReplyState('${m.id}', '${m.text.replace(/'/g, "\\'")}', '${senderName}')">Ответить</button>
                        ${isMe ? `<button class="msg-act-btn" onclick="initiateEditState('${m.id}', '${m.text.replace(/'/g, "\\'")}')">Ред.</button>` : ''}
                        <button class="msg-act-btn" style="color:#ff3b30;" onclick="executeDeleteMessage('${m.id}')">Удалить</button>
                    </div>
                `;
                flow.appendChild(container);
            });
            flow.scrollTop = flow.scrollHeight;
        }

        // ОТПРАВКА И МОДИФИКАЦИЯ ДАННЫХ В ОБЛАКЕ
        function dispatchMessagePacket() {
            const input = document.getElementById('chat-core-input-field');
            const txt = input.value.trim();
            if(!txt) return;

            const chatKey = [currentUserId, activeChatTargetId].sort().join('__');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            if(editingMessageId) {
                // Логика сохранения редактирования
                database.ref('messages/' + chatKey + '/' + editingMessageId).update({
                    text: txt,
                    edited: true
                });
                editingMessageId = null;
            } else {
                // Создание нового сообщения
                const packet = {
                    senderId: currentUserId,
                    text: txt,
                    time: time,
                    timestamp: Date.now()
                };

                if(activeReplyMsgId) {
                    packet.replyToText = document.getElementById('reply-indicator-text-node').getAttribute('data-raw-text');
                    packet.replyToSender = document.getElementById('reply-indicator-text-node').getAttribute('data-raw-sender');
                }

                database.ref('messages/' + chatKey).push(packet);
                if(document.getElementById('set-sound-toggle').checked) soundOut.play().catch(()=>{});
            }

            input.value = '';
            cancelActiveReplyState();
            removeTypingStateIndicator();
        }

        function executeDeleteMessage(msgId) {
            if(confirm('Удалить это сообщение из облака для всех устройств?')) {
                const chatKey = [currentUserId, activeChatTargetId].sort().join('__');
                database.ref('messages/' + chatKey + '/' + msgId).remove();
            }
        }

        function initiateReplyState(msgId, text, senderName) {
            activeReplyMsgId = msgId;
            editingMessageId = null;
            const node = document.getElementById('reply-indicator-node');
            const textNode = document.getElementById('reply-indicator-text-node');
            textNode.innerText = `Ответ пользователю ${senderName}: "${text}"`;
            textNode.setAttribute('data-raw-text', text);
            textNode.setAttribute('data-raw-sender', senderName);
            node.classList.add('visible');
            document.getElementById('chat-core-input-field').focus();
        }

        function initiateEditState(msgId, currentText) {
            editingMessageId = msgId;
            activeReplyMsgId = null;
            document.getElementById('reply-indicator-node').classList.remove('visible');
            const input = document.getElementById('chat-core-input-field');
            input.value = currentText;
            input.focus();
        }

        function cancelActiveReplyState() {
            activeReplyMsgId = null;
            editingMessageId = null;
            document.getElementById('reply-indicator-node').classList.remove('visible');
        }

        // ПУЛЬСИРУЮЩИЙ СТАТУС ПЕЧАТАНИЯ
        function handleLocalUserTypingEvent() {
            const chatKey = [currentUserId, activeChatTargetId].sort().join('__');
            database.ref('typing/' + chatKey + '/' + currentUserId).set(true);

            clearTimeout(typingTimeoutTimer);
            typingTimeoutTimer = setTimeout(() => {
                removeTypingStateIndicator();
            }, 1800);
        }

        function removeTypingStateIndicator() {
            if(activeChatTargetId) {
                const chatKey = [currentUserId, activeChatTargetId].sort().join('__');
                database.ref('typing/' + chatKey + '/' + currentUserId).set(false);
            }
        }

        function clearCurrentChatHistoryInCloud() {
            if(confirm('Вы уверены, что хотите полностью стереть историю этого чата в облаке? Решение необратимо.')) {
                const chatKey = [currentUserId, activeChatTargetId].sort().join('__');
                database.ref('messages/' + chatKey).remove();
            }
        }

        // ДОПОЛНИТЕЛЬНЫЙ ФУНКЦИОНАЛ И КАСТОМИЗАЦИЯ
        function modifyThemeContext(val) {
            localStorage.setItem('set_theme', val);
            syncThemeAndPreferences();
        }

        function modifyWallpaperContext(val) {
            localStorage.setItem('set_wp', val);
            syncThemeAndPreferences();
        }

        function simulateMediaPayloadDispatch() {
            const url = prompt("Введите URL-ссылку на картинку для симуляции отправки медиафайла:");
            if(url) {
                document.getElementById('chat-core-input-field').value = url;
                dispatchMessagePacket();
            }
        }

        function triggerGlobalSearchFlow() {
            localSearchQuery = document.getElementById('global-search-input').value.trim().toLowerCase();
            buildAppUIRenderers();
        }

        function exportChatHistoryJSON() {
            database.ref('messages').once('value', (snapshot) => {
                const data = snapshot.val() || {};
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `archive_messages_backup.json`;
                a.click();
            });
        }

        function exitActiveChatView() {
            removeTypingStateIndicator();
            document.getElementById('app-layout').classList.remove('chat-opened');
            activeChatTargetId = null;
        }
    </script>
</body>
</html>
