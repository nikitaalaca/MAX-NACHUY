<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Telegram iOS Premium</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-secondary-bg: #1c1c1e;
            --ios-tertiary-bg: #2c2c2e;
            --ios-text: #ffffff;
            --ios-subtext: #8e8e93;
            --ios-tint: #0a84ff;
            --ios-border: #38383a;
            --ios-header-bg: rgba(22, 22, 23, 0.75);
            --bubble-in: #2c2c2e;
            --bubble-out: #0a84ff;
            --bubble-out-text: #ffffff;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        [data-theme="light"] {
            --ios-bg: #f2f2f7;
            --ios-secondary-bg: #ffffff;
            --ios-tertiary-bg: #e5e5ea;
            --ios-text: #000000;
            --ios-subtext: #8e8e93;
            --ios-border: #d1d1d6;
            --ios-header-bg: rgba(242, 242, 247, 0.8);
            --bubble-in: #e5e5ea;
            --bubble-out: #007aff;
            --bubble-out-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            overflow: hidden;
            letter-spacing: -0.2px;
        }

        #app-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* PREMIUM PREMIUM TRANSLUCENT HEADER */
        .ios-header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding-top: calc(12px + var(--safe-top));
            padding-bottom: 12px; padding-horizontal: 16px;
            background: var(--ios-header-bg);
            -webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
            border-bottom: 0.5px solid var(--ios-border);
            z-index: 200; display: flex; align-items: center; justify-content: space-between;
            padding-left: 16px; padding-right: 16px;
        }
        .ios-header-title { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
        
        .ios-search-wrapper {
            padding: 0 16px 10px 16px;
            background: var(--ios-header-bg);
            -webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
            margin-top: calc(64px + var(--safe-top));
        }
        .ios-search-bar {
            width: 100%; background: var(--ios-tertiary-bg);
            border: none; padding: 8px 12px; border-radius: 10px;
            color: var(--ios-text); font-size: 16px; outline: none;
        }

        /* MAIN SCROLL AREA */
        .ios-scroll-content {
            flex: 1; overflow-y: auto;
            padding-bottom: calc(90px + var(--safe-bottom));
            -webkit-overflow-scrolling: touch;
        }
        .view-pane { display: none; }
        .view-pane.active { display: block; }

        /* LIST GROUPS (APPLE STYLE) */
        .ios-group-list {
            margin: 16px; background: var(--ios-secondary-bg);
            border-radius: 12px; overflow: hidden;
            border: 0.5px solid var(--ios-border);
        }

        /* CELLS / ROWS */
        .ios-cell {
            display: flex; align-items: center; padding: 12px 16px;
            border-bottom: 0.5px solid var(--ios-border); cursor: pointer;
            transition: background-color 0.2s;
        }
        .ios-cell:last-child { border-bottom: none; }
        .ios-cell:active { background-color: rgba(255, 255, 255, 0.1); }
        [data-theme="light"] .ios-cell:active { background-color: rgba(0, 0, 0, 0.05); }

        .ios-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 16px; color: white;
            margin-right: 14px; flex-shrink: 0; position: relative;
        }
        .status-badge {
            position: absolute; bottom: 0; right: 0; width: 14px; height: 14px;
            background: #34c759; border: 2px solid var(--ios-secondary-bg); border-radius: 50%;
        }

        .ios-cell-body { flex: 1; min-width: 0; }
        .ios-cell-top { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .ios-cell-title { font-size: 17px; font-weight: 600; color: var(--ios-text); }
        .ios-cell-meta { font-size: 14px; color: var(--ios-subtext); }
        .ios-cell-desc { font-size: 15px; color: var(--ios-subtext); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* TRANSLUCENT BOTTOM TAB BAR */
        .ios-tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: calc(52px + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: var(--ios-header-bg);
            -webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
            border-top: 0.5px solid var(--ios-border);
            display: flex; justify-content: space-around; align-items: center; z-index: 200;
        }
        .ios-tab-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: none; border: none; color: var(--ios-subtext); width: 33%; height: 100%; cursor: pointer;
        }
        .ios-tab-item.active { color: var(--ios-tint); }
        .ios-tab-item svg { width: 24px; height: 24px; margin-bottom: 2px; fill: currentColor; }
        .ios-tab-label { font-size: 10px; font-weight: 500; }

        /* FULLSCREEN SLIDE CHAT */
        #ios-chat-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
            background: var(--ios-bg); z-index: 500; display: flex; flex-direction: column;
            transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #ios-chat-overlay.active { transform: translateX(0); }

        .ios-chat-header {
            padding-top: calc(10px + var(--safe-top)); padding-bottom: 10px;
            padding-horizontal: 8px; display: flex; align-items: center; justify-content: space-between;
            background: var(--ios-header-bg); -webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
            border-bottom: 0.5px solid var(--ios-border); padding-left: 12px; padding-right: 12px;
        }
        .ios-back-btn { background: none; border: none; color: var(--ios-tint); font-size: 17px; display: flex; align-items: center; cursor: pointer; gap: 4px; }
        .ios-back-btn svg { width: 12px; height: 21px; fill: currentColor; }

        .chat-history { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        
        /* APPLE MESSAGES BUBBLES */
        .bubble-row { display: flex; width: 100%; }
        .bubble-row.sent { justify-content: flex-end; }
        .bubble-row.received { justify-content: flex-start; }
        
        .bubble-text {
            max-width: 70%; padding: 10px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4;
            position: relative; word-wrap: break-word;
        }
        .bubble-row.sent .bubble-text { background: var(--bubble-out); color: var(--bubble-out-text); border-bottom-right-radius: 4px; }
        .bubble-row.received .bubble-text { background: var(--bubble-in); color: var(--ios-text); border-bottom-left-radius: 4px; }

        /* INPUT PANEL WITH ATTACHMENT MOCK */
        .ios-input-bar {
            padding: 8px 12px calc(8px + var(--safe-bottom));
            background: var(--ios-header-bg); -webkit-backdrop-filter: blur(30px); backdrop-filter: blur(30px);
            border-top: 0.5px solid var(--ios-border); display: flex; align-items: center; gap: 10px;
        }
        .ios-input-field {
            flex: 1; background: var(--ios-secondary-bg); border: 0.5px solid var(--ios-border);
            padding: 10px 16px; border-radius: 22px; color: var(--ios-text); font-size: 16px; outline: none;
        }

        /* NATIVE VIDEO CALL HUD */
        #ios-call-hud {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
            background: #000; z-index: 900; display: none; flex-direction: column; justify-content: space-between;
            padding: calc(40px + var(--safe-top)) 20px calc(40px + var(--safe-bottom));
        }
        #ios-call-hud.active { display: flex; }
        .remote-stream-container { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index:1; }
        .local-stream-container { position: absolute; top: calc(20px + var(--safe-top)); right: 20px; width: 110px; height: 160px; object-fit: cover; z-index: 5; border-radius: 12px; border: 2px solid rgba(255,255,255,0.3); }

        .call-btn { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; color: white; }
        .call-btn.hangup { background: #ff3b30; }
        .call-btn.utility { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); }

        /* SETTINGS CONTROL ELEMENTS */
        .theme-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .theme-dot.active { border-color: var(--ios-text); }

        /* AUTH LAYER */
        .ios-auth-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--ios-bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    </style>
</head>
<body>

    <!-- ОКНО РЕГИСТРАЦИИ / ВХОДА -->
    <div id="ios-auth-panel" class="ios-auth-screen">
        <div style="width: 72px; height: 72px; background: var(--ios-tint); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <svg viewBox="0 0 24 24" style="width:42px; height:42px; fill:white;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.24-5.54 3.65-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.42-.88.03-.24.35-.49.97-.74 3.79-1.65 6.32-2.74 7.59-3.27 3.61-1.5 4.36-1.76 4.85-1.77.11 0 .35.03.51.16.13.11.17.27.18.39 0 .06.01.14 0 .22z"/></svg>
        </div>
        <h1 style="font-size:26px; font-weight:700; margin-bottom:24px;">Вход в Telegram</h1>
        <input type="text" id="setup-login" class="ios-search-bar" placeholder="Юзернейм (например: nikita)" style="max-width:300px; margin-bottom:12px; background:var(--ios-secondary-bg); border: 0.5px solid var(--ios-border);">
        <input type="text" id="setup-name" class="ios-search-bar" placeholder="Ваше Имя" style="max-width:300px; margin-bottom:20px; background:var(--ios-secondary-bg); border: 0.5px solid var(--ios-border);">
        <button onclick="commitAuthentication()" style="width:100%; max-width:300px; background:var(--ios-tint); color:white; border:none; padding:14px; border-radius:12px; font-weight:600; font-size:16px; cursor:pointer;">Продолжить</button>
    </div>

    <!-- КОНТЕЙНЕР ПРИЛОЖЕНИЯ -->
    <div id="app-container">
        
        <header class="ios-header">
            <span class="ios-header-title" id="ios-page-title">Чаты</span>
            <div id="user-header-avatar"></div>
        </header>

        <div class="ios-search-wrapper">
            <input type="text" id="ios-search-input" class="ios-search-bar" placeholder="Поиск сообщений и людей" oninput="performGlobalSearch(this.value)">
        </div>

        <main class="ios-scroll-content">
            <!-- ЭКРАН 1: СПИСОК ЧАТОВ -->
            <div id="pane-chats" class="view-pane active">
                <div class="ios-group-list" id="render-target-chats"></div>
            </div>

            <!-- ЭКРАН 2: КОНТАКТЫ -->
            <div id="pane-contacts" class="view-pane">
                <div class="ios-group-list" id="render-target-contacts"></div>
            </div>

            <!-- ЭКРАН 3: НАСТРОЙКИ (APPLE PARADIGM) -->
            <div id="pane-settings" class="view-pane">
                <div class="ios-group-list" style="padding: 20px; text-align: center;">
                    <div id="profile-avatar-large" style="margin: 0 auto 12px auto;"></div>
                    <h2 id="profile-name-large" style="font-size:22px; font-weight:700;">Пользователь</h2>
                    <p id="profile-login-large" style="color:var(--ios-subtext); font-size:14px; margin-bottom:10px;">@login</p>
                    
                    <!-- СТАТУС БАДЖИ (НОВАЯ ФУНКЦИЯ) -->
                    <div style="display:flex; justify-content:center; gap:8px; margin-top:10px;">
                        <button onclick="updateUserStatusEmoji('🎯')" style="background:none; border:none; font-size:20px; cursor:pointer;">🎯</button>
                        <button onclick="updateUserStatusEmoji('🚀')" style="background:none; border:none; font-size:20px; cursor:pointer;">🚀</button>
                        <button onclick="updateUserStatusEmoji('💻')" style="background:none; border:none; font-size:20px; cursor:pointer;">💻</button>
                        <button onclick="updateUserStatusEmoji('🌴')" style="background:none; border:none; font-size:20px; cursor:pointer;">🌴</button>
                    </div>
                </div>

                <div class="ios-group-list">
                    <div class="ios-cell">
                        <div class="ios-cell-body"><span class="ios-cell-title">Темный режим iOS</span></div>
                        <input type="checkbox" id="ios-dark-switch" onchange="toggleDarkThemeState(this.checked)" style="width:24px; height:24px;">
                    </div>
                    <div class="ios-cell">
                        <div class="ios-cell-body"><span class="ios-cell-title">Цветовой Акцент Системы</span></div>
                        <div style="display:flex; gap:8px;">
                            <div class="theme-dot" style="background:#0a84ff;" onclick="setSystemAccentColor('#0a84ff')"></div>
                            <div class="theme-dot" style="background:#34c759;" onclick="setSystemAccentColor('#34c759')"></div>
                            <div class="theme-dot" style="background:#af52de;" onclick="setSystemAccentColor('#af52de')"></div>
                            <div class="theme-dot" style="background:#ff9500;" onclick="setSystemAccentColor('#ff9500')"></div>
                        </div>
                    </div>
                </div>

                <div class="ios-group-list">
                    <div class="ios-cell" onclick="triggerHapticFeedback Simulation(); alert('Кэш оптимизирован. Свободно: 1.2 Гб')">
                        <div class="ios-cell-body"><span class="ios-cell-title" style="color:var(--ios-tint);">Очистить кэш приложения</span></div>
                    </div>
                    <div class="ios-cell" onclick="flushSessionLogs()">
                        <div class="ios-cell-body"><span class="ios-cell-title" style="color:#ff3b30;">Выйти из аккаунта</span></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- APPLE BOTTOM TAB BAR -->
        <nav class="ios-tab-bar">
            <button class="ios-tab-item" id="nav-contacts" onclick="switchActiveViewport('contacts')">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span class="ios-tab-label">Контакты</span>
            </button>
            <button class="ios-tab-item active" id="nav-chats" onclick="switchActiveViewport('chats')">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
                <span class="ios-tab-label">Чаты</span>
            </button>
            <button class="ios-tab-item" id="nav-settings" onclick="switchActiveViewport('settings')">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l-1.92 3.32c-.12.22-.37.29-.59.22l-2.39-.96c-.5.38-1.03.7-1.62.94l-.36 2.54c-.05.24-.24.41-.48.41h-3.84c-.24 0-.43-.17-.47-.41l-.36-2.54c-.59-.24-1.13-.56-1.62-.94l-2.39.96c-.22.08-.47 0-.59-.22l-1.92-3.32c-.12-.22-.07-.47.12-.61l2.03-1.58zM12 15.6c1.98 0 3.6-1.62 3.6-3.6s-1.62-3.6-3.6-3.6-3.6 1.62-3.6 3.6 1.62 3.6 3.6 3.6z"/></svg>
                <span class="ios-tab-label">Настройки</span>
            </button>
        </nav>
    </div>

    <!-- ПОЛНОЭКРАННЫЙ iOS ДИАЛОГ -->
    <div id="ios-chat-overlay">
        <header class="ios-chat-header">
            <button class="ios-back-btn" onclick="dismissChatOverlay()">
                <svg viewBox="0 0 12 21"><path d="M10.5 1.5L1.5 10.5L10.5 19.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
                Назад
            </button>
            <div style="text-align:center;">
                <div id="chat-header-title-text" style="font-weight:600; font-size:16px;">Чат</div>
                <div id="chat-header-status-text" style="font-size:12px; color:var(--ios-subtext);">в сети</div>
            </div>
            <button class="ios-back-btn" onclick="initiateWebRTCCall()">
                <svg viewBox="0 0 24 24" style="width:24px; height:24px; fill:currentColor;"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            </button>
        </header>

        <div class="chat-history" id="chat-messages-scrollnode"></div>

        <footer class="ios-input-bar">
            <button style="background:none; border:none; color:var(--ios-tint); font-size:24px; cursor:pointer;" onclick="alert('Доп. функции: Геолокация, Фото, Файлы отправлены в симуляцию.')">+</button>
            <input type="text" id="chat-message-typing-field" class="ios-input-field" placeholder="Сообщение" onkeypress="if(event.key==='Enter') executeSendMessage()">
            <button style="background:none; border:none; color:var(--ios-tint); font-weight:600; font-size:16px; cursor:pointer;" onclick="executeSendMessage()">Отпр.</button>
        </footer>
    </div>

    <!-- СИСТЕМА ВИДЕОЗВОНКОВ (APPLE FACETIME STYLE) -->
    <div id="ios-call-hud">
        <video id="remote-video-render" class="remote-stream-container" autoplay playsinline></video>
        <video id="local-video-render" class="local-stream-container" autoplay playsinline muted></video>
        
        <div style="position:relative; z-index:10; text-align:center; color:white; margin-top:20px;">
            <h2 id="hud-call-name" style="font-size:26px; font-weight:600;">FaceTime...</h2>
            <p id="hud-call-status" style="font-size:14px; opacity:0.7; margin-top:4px;">Соединение WebRTC...</p>
        </div>

        <div style="position:relative; z-index:10; display:flex; justify-content:center; gap:24px; width:100%;">
            <button class="call-btn utility" onclick="mutateCameraTrack()">Камера</button>
            <button class="call-btn hangup" onclick="hangupCurrentCallSession()">
                <svg viewBox="0 0 24 24" style="width:28px; height:28px; fill:white;"><path d="M12 21c-4.41 0-8-3.59-8-8 0-3.95 2.87-7.24 6.64-7.93l-1.92-1.92 1.41-1.41 4.24 4.24-4.24 4.24-1.41-1.41 1.73-1.73C6.44 9.17 5 11.23 5 13c0 3.86 3.14 7 7 7s7-3.14 7-7c0-1.07-.24-2.11-.69-3.05l1.47-1.47C20.53 10.01 21 11.49 21 13c0 4.41-3.59 8-8 8z"/></svg>
            </button>
        </div>
    </div>

    <!-- SCRIPTS CONFIG -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIZhTEWNTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com",
            projectId: "yw-83b3e",
            storageBucket: "yw-83b3e.firebasestorage.app",
            messagingSenderId: "513977614231",
            appId: "1:513977614231:web:0a04427784e8259fdeced2"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUserId = localStorage.getItem('tg_uid') || null;
        let allUsers = [];
        let currentActiveViewport = 'chats';
        let targetedPartnerId = null;
        let searchQueryString = "";

        // WebRTC variables
        let localMediaStream = null;
        let peerConnectionObject = null;
        let activeCallDatabaseReference = null;

        window.addEventListener('DOMContentLoaded', () => {
            const isDark = localStorage.getItem('ios_dark_state') !== 'false';
            toggleDarkThemeState(isDark);
            document.getElementById('ios-dark-switch').checked = isDark;

            const savedAccent = localStorage.getItem('ios_accent_color') || '#0a84ff';
            setSystemAccentColor(savedAccent);

            database.ref('users').on('value', (snap) => {
                allUsers = Object.values(snap.val() || {});
                refreshInterfaceLayers();
            });

            if (currentUserId) {
                document.getElementById('ios-auth-panel').style.display = 'none';
            }
        });

        function switchActiveViewport(pane) {
            currentActiveViewport = pane;
            document.querySelectorAll('.ios-tab-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));

            document.getElementById('nav-' + pane).classList.add('active');
            document.getElementById('pane-' + pane).classList.add('active');

            const headers = { chats: "Чаты", contacts: "Контакты", settings: "Настройки" };
            document.getElementById('ios-page-title').innerText = headers[pane];
            refreshInterfaceLayers();
        }

        function toggleDarkThemeState(isDark) {
            localStorage.setItem('ios_dark_state', isDark);
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        }

        function setSystemAccentColor(color) {
            localStorage.setItem('ios_accent_color', color);
            document.documentElement.style.setProperty('--ios-tint', color);
        }

        function triggerHapticFeedbackSimulation() {
            if ("vibrate" in navigator) navigator.vibrate(15);
        }

        function commitAuthentication() {
            const login = document.getElementById('setup-login').value.trim().toLowerCase();
            const name = document.getElementById('setup-name').value.trim();
            if(!login || !name) return;

            const existing = allUsers.find(u => u.login === login);
            if(existing) {
                currentUserId = existing.id;
            } else {
                currentUserId = "uid_" + Date.now();
                const nodeColors = ["#0a84ff", "#30d158", "#ff9f0a", "#bf5af2", "#ff453a"];
                const color = nodeColors[Math.floor(Math.random() * nodeColors.length)];
                database.ref('users/' + currentUserId).set({
                    id: currentUserId, login, name, color, role: "Пользователь iOS", emojiStatus: "🎯"
                });
            }
            localStorage.setItem('tg_uid', currentUserId);
            document.getElementById('ios-auth-panel').style.display = 'none';
            refreshInterfaceLayers();
        }

        function updateUserStatusEmoji(emoji) {
            if(!currentUserId) return;
            database.ref(`users/${currentUserId}/emojiStatus`).set(emoji);
            alert(`Статус изменен на ${emoji}`);
        }

        function performGlobalSearch(val) {
            searchQueryString = val.toLowerCase();
            refreshInterfaceLayers();
        }

        function refreshInterfaceLayers() {
            if(!currentUserId) return;
            const me = allUsers.find(u => u.id === currentUserId);
            if(me) {
                const avatarHTML = `<div class="ios-avatar" style="background:${me.color}; width:32px; height:32px; font-size:12px; margin:0;">${me.name.substring(0,2).toUpperCase()}</div>`;
                document.getElementById('user-header-avatar').innerHTML = avatarHTML;

                document.getElementById('profile-avatar-large').innerHTML = `<div class="ios-avatar" style="background:${me.color}; width:72px; height:72px; font-size:24px; margin:0 auto;">${me.name.substring(0,2).toUpperCase()}</div>`;
                document.getElementById('profile-name-large').innerText = `${me.name} ${me.emojiStatus || ''}`;
                document.getElementById('profile-login-large').innerText = `@${me.login}`;
            }

            if(currentActiveViewport === 'chats') renderChatsTab();
            if(currentActiveViewport === 'contacts') renderContactsTab();
        }

        function renderContactsTab() {
            const container = document.getElementById('render-target-contacts');
            container.innerHTML = '';
            const scope = allUsers.filter(u => u.id !== currentUserId && (u.name.toLowerCase().includes(searchQueryString) || u.login.toLowerCase().includes(searchQueryString)));

            if(scope.length === 0) {
                container.innerHTML = `<div style="padding:20px; text-align:center; color:var(--ios-subtext);">Никого не найдено</div>`;
                return;
            }

            scope.forEach(u => {
                const row = document.createElement('div');
                row.className = 'ios-cell';
                row.onclick = () => showChatOverlayWindow(u.id);
                row.innerHTML = `
                    <div class="ios-avatar" style="background:${u.color}">${u.name.substring(0,2).toUpperCase()}<div class="status-badge"></div></div>
                    <div class="ios-cell-body">
                        <div class="ios-cell-top"><span class="ios-cell-title">${u.name} ${u.emojiStatus || ''}</span></div>
                        <div class="ios-cell-desc">@${u.login} • ${u.role || 'iOS Клиент'}</div>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function renderChatsTab() {
            const container = document.getElementById('render-target-chats');
            container.innerHTML = '';

            database.ref('messages').once('value', (snapshot) => {
                const map = snapshot.val() || {};
                let counter = 0;

                allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                    const rKey = [currentUserId, u.id].sort().join('__');
                    if(!map[rKey]) return;

                    const arr = Object.values(map[rKey]);
                    const ultimateMessage = arr[arr.length - 1];

                    if(!u.name.toLowerCase().includes(searchQueryString)) return;
                    counter++;

                    const row = document.createElement('div');
                    row.className = 'ios-cell';
                    row.onclick = () => showChatOverlayWindow(u.id);
                    row.innerHTML = `
                        <div class="ios-avatar" style="background:${u.color}">${u.name.substring(0,2).toUpperCase()}</div>
                        <div class="ios-cell-body">
                            <div class="ios-cell-top">
                                <span class="ios-cell-title">${u.name}</span>
                                <span class="ios-cell-meta">${ultimateMessage.time || ''}</span>
                            </div>
                            <div class="ios-cell-desc">${ultimateMessage.text || ''}</div>
                        </div>
                    `;
                    container.appendChild(row);
                });

                if(counter === 0) {
                    container.innerHTML = `<div style="padding:40px 20px; text-align:center; color:var(--ios-subtext);">Нет активных диалогов.<br>Напишите кому-нибудь из Контактов.</div>`;
                }
            });
        }

        let dynamicMessageListener = null;

        function showChatOverlayWindow(partnerId) {
            triggerHapticFeedbackSimulation();
            targetedPartnerId = partnerId;
            const user = allUsers.find(u => u.id === partnerId);
            if(!user) return;

            document.getElementById('chat-header-title-text').innerText = user.name;
            document.getElementById('chat-header-status-text').innerText = user.role || 'в сети';
            document.getElementById('ios-chat-overlay').classList.add('active');

            const rKey = [currentUserId, partnerId].sort().join('__');
            if(dynamicMessageListener) dynamicMessageListener.off();

            dynamicMessageListener = database.ref('messages/' + rKey);
            dynamicMessageListener.on('value', (snap) => {
                const historyNode = document.getElementById('chat-messages-scrollnode');
                historyNode.innerHTML = '';
                
                const data = snap.val() || {};
                Object.values(data).forEach(m => {
                    const state = m.senderId === currentUserId ? 'sent' : 'received';
                    const wrapper = document.createElement('div');
                    wrapper.className = `bubble-row ${state}`;
                    wrapper.innerHTML = `<div class="bubble-text">${m.text}</div>`;
                    historyNode.appendChild(wrapper);
                });
                historyNode.scrollTop = historyNode.scrollHeight;
            });
        }

        function dismissChatOverlay() {
            document.getElementById('ios-chat-overlay').classList.remove('active');
            targetedPartnerId = null;
            refreshInterfaceLayers();
        }

        function executeSendMessage() {
            const input = document.getElementById('chat-message-typing-field');
            const text = input.value.trim();
            if(!text || !targetedPartnerId) return;

            const rKey = [currentUserId, targetedPartnerId].sort().join('__');
            const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            database.ref('messages/' + rKey).push({
                senderId: currentUserId,
                text: text,
                time: timeStr,
                timestamp: Date.now()
            });
            input.value = '';
            triggerHapticFeedbackSimulation();
        }

        function flushSessionLogs() {
            localStorage.clear();
            location.reload();
        }

        // =========================================================================
        // REALTIME FACETIME PIPELINE (WebRTC ENGINE)
        // =========================================================================
        async function initiateWebRTCCall() {
            if(!targetedPartnerId) return;
            triggerHapticFeedbackSimulation();

            const callId = [currentUserId, targetedPartnerId].sort().join('__');
            activeCallDatabaseReference = database.ref('facetime/' + callId);

            const target = allUsers.find(u => u.id === targetedPartnerId);
            document.getElementById('hud-call-name').innerText = target ? target.name : "Абонент";
            document.getElementById('ios-call-hud').classList.add('active');

            localMediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video-render').srcObject = localMediaStream;

            peerConnectionObject = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localMediaStream.getTracks().forEach(t => peerConnectionObject.addTrack(t, localMediaStream));

            peerConnectionObject.ontrack = (e) => {
                document.getElementById('remote-video-render').srcObject = e.streams[0];
                document.getElementById('hud-call-status').innerText = "Разговор по FaceTime";
            };

            const offer = await peerConnectionObject.createOffer();
            await peerConnectionObject.setLocalDescription(offer);

            await activeCallDatabaseReference.set({
                id: callId, callerId: currentUserId, calleeId: targetedPartnerId, status: 'ringing',
                offer: { type: offer.type, sdp: offer.sdp }
            });
        }

        function hangupCurrentCallSession() {
            if(activeCallDatabaseReference) {
                activeCallDatabaseReference.remove();
            }
            document.getElementById('ios-call-hud').classList.remove('active');
            if(localMediaStream) {
                localMediaStream.getTracks().forEach(t => t.stop());
                localMediaStream = null;
            }
            if(peerConnectionObject) {
                peerConnectionObject.close();
                peerConnectionObject = null;
            }
        }

        function mutateCameraTrack() {
            if(localMediaStream) {
                const track = localMediaStream.getVideoTracks()[0];
                track.enabled = !track.enabled;
            }
        }
    </script>
</body>
</html>
