<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Telegram Connect</title>
    <style>
        :root {
            --tg-bg: #ffffff;
            --tg-secondary-bg: #f4f4f5;
            --tg-text: #000000;
            --tg-subtext: #8e8e93;
            --tg-blue: #248bfe;
            --tg-border: #d1d1d6;
            --tg-chat-bg: #e7ebf0;
            --bubble-in: #ffffff;
            --bubble-out: #248bfe;
            --bubble-out-text: #ffffff;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        [data-theme="dark"] {
            --tg-bg: #17212b;
            --tg-secondary-bg: #0e1621;
            --tg-text: #ffffff;
            --tg-subtext: #7f8c99;
            --tg-blue: #5288c1;
            --tg-border: #101921;
            --tg-chat-bg: #0e1621;
            --bubble-in: #182533;
            --bubble-out: #2b5278;
            --bubble-out-text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body, html { 
            width: 100%; height: 100%; 
            background-color: var(--tg-bg); color: var(--tg-text); 
            overflow: hidden; position: relative;
        }

        /* ГЛАВНЫЙ ЭКРАН ПРИЛОЖЕНИЯ */
        #app-viewport {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            padding-top: var(--safe-top);
            position: relative;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ СТИЛЬ TELEGRAM */
        .tg-header {
            height: 52px; padding: 0 16px;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--tg-bg); border-bottom: 0.5px solid var(--tg-border);
            z-index: 10; flex-shrink: 0;
        }
        .tg-header-title { font-size: 18px; font-weight: 600; }

        /* ОСНОВНОЙ КОНТЕНТ */
        .tg-content-area {
            flex: 1; overflow-y: auto; background: var(--tg-bg);
            padding-bottom: calc(60px + var(--safe-bottom));
            -webkit-overflow-scrolling: touch;
        }
        .view-layer { display: none; }
        .view-layer.active { display: block; }

        /* ЭЛЕМЕНТЫ СПИСКА (ЯЧЕЙКИ ХЕДЕРА/ЧАТА) */
        .tg-cell {
            display: flex; align-items: center; padding: 10px 16px;
            border-bottom: 0.5px solid var(--tg-border); cursor: pointer;
            background: var(--tg-bg);
        }
        .tg-cell:active { background: rgba(0,0,0,0.05); }
        
        .tg-avatar {
            width: 48px; height: 48px; border-radius: 50%; color: #fff; font-weight: 600;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
            margin-right: 12px; flex-shrink: 0;
        }
        .tg-cell-info { flex: 1; min-width: 0; }
        .tg-cell-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .tg-cell-name { font-size: 16px; font-weight: 600; color: var(--tg-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tg-cell-time { font-size: 13px; color: var(--tg-subtext); }
        .tg-cell-msg { font-size: 14px; color: var(--tg-subtext); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* НИЖНИЙ НАВ БАР ТАБОВ (NATIVE Bottom Navigation) */
        .tg-bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: calc(54px + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: var(--tg-secondary-bg); border-top: 0.5px solid var(--tg-border);
            display: flex; justify-content: space-around; align-items: center; z-index: 50;
        }
        .nav-tab {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: none; border: none; color: var(--tg-subtext); cursor: pointer; width: 33.33%; height: 100%;
        }
        .nav-tab.active { color: var(--tg-blue); }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
        .nav-label { font-size: 11px; font-weight: 500; }

        /* ПОЛНОЭКРАННОЕ ОКНО ЧАТА НА 100% ЭКРАНА */
        #tg-chat-view {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
            background: var(--tg-chat-bg); z-index: 100; display: flex; flex-direction: column;
            transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.1, 0.8, 0.25, 1);
            padding-top: var(--safe-top);
        }
        #tg-chat-view.active { transform: translateX(0); }

        .chat-navbar {
            height: 52px; padding: 0 12px; display: flex; align-items: center; justify-content: space-between;
            background: var(--tg-bg); border-bottom: 0.5px solid var(--tg-border);
        }
        .back-btn { background: none; border: none; color: var(--tg-blue); font-size: 16px; font-weight: 500; display: flex; align-items: center; cursor: pointer; }
        .chat-navbar-center { text-align: center; flex: 1; min-width: 0; padding: 0 8px; }
        .chat-navbar-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-navbar-status { font-size: 12px; color: var(--tg-subtext); }

        .chat-history { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; -webkit-overflow-scrolling: touch; }
        
        /* ОБЛАЧКА ТЕЛЕГРАМ СООБЩЕНИЙ */
        .msg-line { display: flex; width: 100%; }
        .msg-line.out { justify-content: flex-end; }
        .msg-line.in { justify-content: flex-start; }
        
        .msg-box { max-width: 75%; padding: 8px 12px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.05); }
        .out .msg-box { background: var(--bubble-out); color: var(--bubble-out-text); border-bottom-right-radius: 4px; }
        .in .msg-box { background: var(--bubble-in); color: var(--tg-text); border-bottom-left-radius: 4px; }
        
        .msg-meta { display: inline-block; font-size: 10px; margin-left: 8px; float: right; margin-top: 4px; opacity: 0.6; }
        .out .msg-meta { color: #ffffff; }

        /* СТРОКА ВВОДА TELEGRAM STYLE */
        .tg-input-panel {
            padding: 8px 12px calc(8px + var(--safe-bottom));
            background: var(--tg-bg); border-top: 0.5px solid var(--tg-border);
            display: flex; align-items: center; gap: 10px;
        }
        .tg-input-panel input {
            flex: 1; padding: 9px 14px; border-radius: 20px; border: 0.5px solid var(--tg-border);
            background: var(--tg-secondary-bg); color: var(--tg-text); font-size: 15px; outline: none;
        }
        .action-icon-btn { background: none; border: none; color: var(--tg-blue); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }

        /* ОКНО ЗВОНКА TELEGRAM VIDEO CALL */
        #call-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
            background: #111; z-index: 500; display: none; flex-direction: column; justify-content: space-between;
        }
        #call-screen.active { display: flex; }
        .video-remote { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .video-local { position: absolute; top: calc(20px + var(--safe-top)); right: 16px; width: 90px; height: 135px; object-fit: cover; z-index: 5; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); }
        
        .call-ui-overlay { position: absolute; bottom: calc(30px + var(--safe-bottom)); left: 0; width: 100%; z-index: 10; display: flex; justify-content: center; gap: 24px; }
        .btn-call-circle { width: 56px; height: 56px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
        .btn-call-circle.red { background: #fe3b30; color: #fff; }
        .btn-call-circle.gray { background: rgba(255,255,255,0.2); color: #fff; }

        /* ПОДПЛЫВАЮЩИЙ ХЕДЕР ДЛЯ ЗВОНКА */
        #call-alert-banner {
            position: fixed; top: calc(10px + var(--safe-top)); left: 50%; transform: translateX(-50%) translateY(-200%);
            width: 92%; max-width: 360px; background: rgba(28,28,30,0.96); border-radius: 16px; padding: 14px;
            display: flex; align-items: center; justify-content: space-between; color: white; z-index: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        #call-alert-banner.active { transform: translateX(-50%) translateY(0); }
        .banner-controls { display: flex; gap: 8px; }
        .b-btn { border: none; padding: 8px 14px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; }
        .b-btn.ok { background: #34c759; color: white; }
        .b-btn.no { background: #ff3b30; color: white; }

        /* ВХОД */
        .auth-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--tg-bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .auth-field { width: 100%; max-width: 320px; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--tg-border); background: var(--tg-secondary-bg); color: var(--tg-text); margin-bottom: 14px; font-size: 16px; outline: none; }
        .auth-btn { width: 100%; max-width: 320px; padding: 14px; border-radius: 10px; border: none; background: var(--tg-blue); color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ОКНО АВТОРИЗАЦИИ -->
    <div id="auth-layer" class="auth-container">
        <div style="font-size: 54px; margin-bottom: 10px;">💬</div>
        <h2 style="margin-bottom: 8px; font-weight: 600;">Коллаж Сеть</h2>
        <p style="color: var(--tg-subtext); font-size: 14px; text-align: center; margin-bottom: 24px;">Введите логин и имя для авторизации</p>
        <input type="text" id="inp-login" class="auth-field" placeholder="Уникальный логин">
        <input type="text" id="inp-name" class="auth-field" placeholder="Ваше имя">
        <button class="auth-btn" onclick="handleInstantLogin()">Продолжить</button>
    </div>

    <!-- ТЕЛЕГРАМ ВИДЕОЗВОНОК SCREEN -->
    <div id="call-screen">
        <video id="video-remote-track" class="video-remote" autoplay playsinline></video>
        <video id="video-local-track" class="video-local" autoplay playsinline muted></video>
        <div class="call-ui-overlay">
            <button class="btn-call-circle gray" onclick="toggleCameraTrack()">📷</button>
            <button class="btn-call-circle red" onclick="terminateCallSession()">📞</button>
        </div>
    </div>

    <!-- ПЛАШКА ВХОДЯЩЕГО ВЫЗОВА -->
    <div id="call-alert-banner">
        <div>
            <div style="font-weight:600; font-size:15px;" id="lbl-caller-name">Входящий звонок</div>
            <div style="font-size:12px; opacity:0.6;">Telegram Video</div>
        </div>
        <div class="banner-controls">
            <button class="b-btn no" onclick="rejectIncomingCall()">Отклонить</button>
            <button class="b-btn ok" onclick="acceptIncomingCall()">Ответить</button>
        </div>
    </div>

    <!-- ОСНОВНАЯ ОБОЛОЧКА ПРИЛОЖЕНИЯ -->
    <div id="app-viewport">
        
        <header class="tg-header">
            <span class="tg-header-title" id="tg-title-node">Чаты</span>
            <div id="tg-self-avatar"></div>
        </header>

        <main class="tg-content-area">
            <!-- ЭКРАН 1: СПИСОК АКТИВНЫХ ДИАЛОГОВ -->
            <div id="layer-chats" class="view-layer active"></div>

            <!-- ЭКРАН 2: СПИСОК КОНТАКТОВ -->
            <div id="layer-contacts" class="view-layer"></div>

            <!-- ЭКРАН 3: НАСТРОЙКИ -->
            <div id="layer-settings" class="view-layer" style="padding: 16px;">
                <div style="background: var(--tg-secondary-bg); border-radius: 12px; padding: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <span style="font-weight: 500;">Темный режим</span>
                    <input type="checkbox" id="dark-theme-toggle" onchange="switchTheme(this.checked)" style="width:20px; height:20px;">
                </div>
                <button onclick="logOutSession()" style="width:100%; padding:14px; border:none; border-radius:12px; background:#ff3b30; color:white; font-weight:600; font-size:15px;">Выйти из аккаунта</button>
            </div>
        </main>

        <!-- НАТИВНЫЙ НИЖНИЙ БАР -->
        <nav class="tg-bottom-nav">
            <button class="nav-tab" id="tab-contacts" onclick="navigateToTab('contacts')">
                <div class="nav-icon">👥</div>
                <div class="nav-label">Контакты</div>
            </button>
            <button class="nav-tab active" id="tab-chats" onclick="navigateToTab('chats')">
                <div class="nav-icon">💬</div>
                <div class="nav-label">Чаты</div>
            </button>
            <button class="nav-tab" id="tab-settings" onclick="navigateToTab('settings')">
                <div class="nav-icon">⚙️</div>
                <div class="nav-label">Настройки</div>
            </button>
        </nav>
    </div>

    <!-- ПОЛНОЭКРАННЫЙ СЛАЙД-ЧАТ iMESSAGE/TELEGRAM -->
    <div id="tg-chat-view">
        <header class="chat-navbar">
            <button class="back-btn" onclick="leaveChatRoomView()">
                <span style="font-size:24px; margin-right:2px; line-height:1;">‹</span> Назад
            </button>
            <div class="chat-navbar-center">
                <div class="chat-navbar-name" id="node-chat-partner-name">...</div>
                <div class="chat-navbar-status" id="node-chat-partner-status">в сети</div>
            </div>
            <!-- КНОПКА ВИДЕОЗВОНКА -->
            <button class="action-icon-btn" onclick="startVideoCallPipeline()" title="Видеозвонок">📹</button>
        </header>
        
        <div class="chat-history" id="chat-scroller-node"></div>
        
        <footer class="tg-input-panel">
            <input type="text" id="chat-text-input" placeholder="Сообщение" onkeypress="if(event.key==='Enter') transmitMessagePacket()">
            <button class="action-icon-btn" onclick="transmitMessagePacket()">➔</button>
        </footer>
    </div>

    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIZhTEWNTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com",
            projectId: "yw-83b3e",
            storageBucket: "yw-83b3e.firebasestorage.app",
            messagingSenderId: "513977614231",
            appId: "1:513977614231:web:0a04427784e8259fdeced2"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUserId = localStorage.getItem('tg_uid') || null;
        let allUsers = [];
        let currentActiveTab = 'chats';
        let currentChatPartnerId = null;

        // WebRTC Signaling State
        let localStream = null;
        let peerConnection = null;
        let activeCallRef = null;
        const iceServersConfig = { iceServers: [{ urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }] };

        window.addEventListener('DOMContentLoaded', () => {
            const mode = localStorage.getItem('tg_dark') === 'true';
            switchTheme(mode);
            document.getElementById('dark-theme-toggle').checked = mode;

            database.ref('users').on('value', (snap) => {
                allUsers = Object.values(snap.val() || {});
                renderDynamicInterface();
                listenIncomingCalls();
            });

            if (currentUserId) {
                document.getElementById('auth-layer').style.display = 'none';
            }
        });

        function handleInstantLogin() {
            const login = document.getElementById('inp-login').value.trim().toLowerCase();
            const name = document.getElementById('inp-name').value.trim();
            if (!login || !name) return;

            const userMatch = allUsers.find(u => u.login === login);
            if (userMatch) {
                currentUserId = userMatch.id;
            } else {
                currentUserId = "id_" + Date.now();
                const colors = ["#248bfe", "#34c759", "#ff9500", "#ff2d55", "#af52de"];
                const color = colors[Math.floor(Math.random() * colors.length)];
                database.ref('users/' + currentUserId).set({
                    id: currentUserId, login, name, color, role: "Пользователь сети"
                });
            }
            localStorage.setItem('tg_uid', currentUserId);
            document.getElementById('auth-layer').style.display = 'none';
            renderDynamicInterface();
        }

        function logOutSession() {
            localStorage.removeItem('tg_uid');
            location.reload();
        }

        function navigateToTab(tabName) {
            currentActiveTab = tabName;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view-layer').forEach(v => v.classList.remove('active'));
            
            document.getElementById('tab-' + tabName).classList.add('active');
            document.getElementById('layer-' + tabName).classList.add('active');

            const headers = { chats: "Чаты", contacts: "Контакты", settings: "Настройки" };
            document.getElementById('tg-title-node').innerText = headers[tabName];
            renderDynamicInterface();
        }

        function renderDynamicInterface() {
            if (!currentUserId) return;
            const me = allUsers.find(u => u.id === currentUserId);
            if (me) {
                document.getElementById('tg-self-avatar').innerHTML = `<div class="tg-avatar" style="background:${me.color}; width:32px; height:32px; font-size:12px; margin:0;">${me.name.substring(0,2).toUpperCase()}</div>`;
            }
            if (currentActiveTab === 'contacts') drawContactsView();
            if (currentActiveTab === 'chats') drawChatsView();
        }

        function drawContactsView() {
            const root = document.getElementById('layer-contacts');
            root.innerHTML = '';
            allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                const cell = document.createElement('div');
                cell.className = 'tg-cell';
                cell.onclick = () => initChatRoomOverlay(u.id);
                cell.innerHTML = `
                    <div class="tg-avatar" style="background:${u.color}">${u.name.substring(0,2).toUpperCase()}</div>
                    <div class="tg-cell-info">
                        <div class="tg-cell-top"><span class="tg-cell-name">${u.name}</span></div>
                        <div class="tg-cell-msg">${u.role || 'В сети'}</div>
                    </div>
                `;
                root.appendChild(cell);
            });
        }

        function drawChatsView() {
            const root = document.getElementById('layer-chats');
            root.innerHTML = '';
            
            database.ref('messages').once('value', (snap) => {
                const msgs = snap.val() || {};
                let count = 0;

                allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                    const roomKey = [currentUserId, u.id].sort().join('__');
                    if (!msgs[roomKey]) return;
                    count++;

                    const packetList = Object.values(msgs[roomKey]);
                    const lastPacket = packetList[packetList.length - 1];

                    const cell = document.createElement('div');
                    cell.className = 'tg-cell';
                    cell.onclick = () => initChatRoomOverlay(u.id);
                    cell.innerHTML = `
                        <div class="tg-avatar" style="background:${u.color}">${u.name.substring(0,2).toUpperCase()}</div>
                        <div class="tg-cell-info">
                            <div class="tg-cell-top">
                                <span class="tg-cell-name">${u.name}</span>
                                <span class="tg-cell-time">${lastPacket.time || ''}</span>
                            </div>
                            <div class="tg-cell-msg">${lastPacket.text || ''}</div>
                        </div>
                    `;
                    root.appendChild(cell);
                });

                if (count === 0) {
                    root.innerHTML = `<div style="text-align:center; padding:50px 20px; color:var(--tg-subtext); font-size:14px;">Список чатов пуст.<br>Откройте вкладку "Контакты" для начала общения.</div>`;
                }
            });
        }

        let messagesReference = null;

        function initChatRoomOverlay(partnerId) {
            currentChatPartnerId = partnerId;
            const target = allUsers.find(u => u.id === partnerId);
            if (!target) return;

            document.getElementById('node-chat-partner-name').innerText = target.name;
            document.getElementById('node-chat-partner-status').innerText = target.role || 'в сети';
            document.getElementById('tg-chat-view').classList.add('active');

            const roomKey = [currentUserId, partnerId].sort().join('__');
            if (messagesReference) messagesReference.off();

            messagesReference = database.ref('messages/' + roomKey);
            messagesReference.on('value', (snap) => {
                const data = snap.val() || {};
                const list = Object.keys(data).map(k => data[k]);
                
                const scroller = document.getElementById('chat-scroller-node');
                scroller.innerHTML = '';
                
                list.forEach(m => {
                    const isMe = m.senderId === currentUserId;
                    const line = document.createElement('div');
                    line.className = `msg-line ${isMe ? 'out' : 'in'}`;
                    line.innerHTML = `
                        <div class="msg-box">
                            <span>${m.text}</span>
                            <span class="msg-meta">${m.time}</span>
                        </div>
                    `;
                    scroller.appendChild(line);
                });
                scroller.scrollTop = scroller.scrollHeight;
            });
        }

        function leaveChatRoomView() {
            document.getElementById('tg-chat-view').classList.remove('active');
            currentChatPartnerId = null;
            drawChatsView();
        }

        function transmitMessagePacket() {
            const input = document.getElementById('chat-text-input');
            const text = input.value.trim();
            if (!text || !currentChatPartnerId) return;

            const roomKey = [currentUserId, currentChatPartnerId].sort().join('__');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            database.ref('messages/' + roomKey).push({
                senderId: currentUserId,
                text: text,
                time: time
            });
            input.value = '';
        }

        function switchTheme(isDark) {
            localStorage.setItem('tg_dark', isDark);
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        }

        // =========================================================================
        // 📞 СИГНАЛЬНОЕ ЯДРО ВЕБ-ЗВОНКОВ (WebRTC Engine)
        // =========================================================================

        function listenIncomingCalls() {
            if (!currentUserId) return;
            database.ref('facetime').on('value', async (snapshot) => {
                const data = snapshot.val() || {};
                for (let key in data) {
                    const session = data[key];
                    if (session.calleeId === currentUserId && session.status === 'ringing') {
                        activeCallRef = database.ref('facetime/' + key);
                        const caller = allUsers.find(u => u.id === session.callerId);
                        
                        document.getElementById('lbl-caller-name').innerText = caller ? caller.name : "Вызов";
                        document.getElementById('call-alert-banner').classList.add('active');

                        activeCallRef.on('value', (innerSnap) => {
                            if (!innerSnap.exists() || innerSnap.val().status === 'ended') {
                                wipeCallDOMState();
                            }
                        });
                        break;
                    }
                }
            });
        }

        async function startVideoCallPipeline() {
            if (!currentChatPartnerId) return;
            const callId = [currentUserId, currentChatPartnerId].sort().join('__');
            activeCallRef = database.ref('facetime/' + callId);

            document.getElementById('call-screen').classList.add('active');

            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('video-local-track').srcObject = localStream;

            peerConnection = new RTCPeerConnection(iceServersConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (e) => {
                document.getElementById('video-remote-track').srcObject = e.streams[0];
            };

            peerConnection.onicecandidate = (e) => {
                if (e.candidate) activeCallRef.child('callerCandidates').push(e.candidate.toJSON());
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await activeCallRef.set({
                id: callId,
                callerId: currentUserId,
                calleeId: currentChatPartnerId,
                status: 'ringing',
                offer: { type: offer.type, sdp: offer.sdp }
            });

            activeCallRef.child('answer').on('value', async (snap) => {
                const ans = snap.val();
                if (ans && peerConnection.signalingState !== "stable") {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(ans));
                }
            });

            activeCallRef.child('calleeCandidates').on('child_added', (snap) => {
                if (snap.val() && peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
        }

        async function acceptIncomingCall() {
            document.getElementById('call-alert-banner').classList.remove('active');
            document.getElementById('call-screen').classList.add('active');

            const snap = await activeCallRef.get();
            const sessionData = snap.val();

            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('video-local-track').srcObject = localStream;

            peerConnection = new RTCPeerConnection(iceServersConfig);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (e) => {
                document.getElementById('video-remote-track').srcObject = e.streams[0];
            };

            peerConnection.onicecandidate = (e) => {
                if (e.candidate) activeCallRef.child('calleeCandidates').push(e.candidate.toJSON());
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(sessionData.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            await activeCallRef.update({
                status: 'connected',
                answer: { type: answer.type, sdp: answer.sdp }
            });

            activeCallRef.child('callerCandidates').on('child_added', (cSnap) => {
                if (cSnap.val() && peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(cSnap.val()));
            });
        }

        function rejectIncomingCall() {
            document.getElementById('call-alert-banner').classList.remove('active');
            if (activeCallRef) {
                activeCallRef.update({ status: 'ended' });
                activeCallRef.remove();
            }
        }

        function terminateCallSession() {
            if (activeCallRef) {
                activeCallRef.update({ status: 'ended' });
                activeCallRef.remove();
            }
            wipeCallDOMState();
        }

        function wipeCallDOMState() {
            document.getElementById('call-screen').classList.remove('active');
            document.getElementById('call-alert-banner').classList.remove('active');
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
        }

        function toggleCameraTrack() {
            if (localStream) {
                const track = localStream.getVideoTracks()[0];
                track.enabled = !track.enabled;
            }
        }
    </script>
</body>
