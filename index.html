<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Collage Liquid Connect</title>
    <style>
        :root {
            --ios-blur: blur(30px) saturate(190%);
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #000000;
            --text-sub: #6c6c70;
            --apple-blue: #007af5;
            --apple-gradient: linear-gradient(135deg, #007af5 0%, #2f9fff 100%);
            --bubble-out: #007af5;
            --bubble-in: rgba(255, 255, 255, 0.7);
            --mesh-bg: radial-gradient(at 0% 0%, #e2e9ff 0px, transparent 50%),
                       radial-gradient(at 50% 0%, #ffeaf1 0px, transparent 50%),
                       radial-gradient(at 100% 100%, #eafcff 0px, transparent 50%);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        [data-theme="dark"] {
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sub: #98989d;
            --apple-blue: #2997ff;
            --bubble-in: rgba(30, 30, 35, 0.75);
            --mesh-bg: radial-gradient(at 0% 0%, #1a103c 0px, transparent 50%),
                       radial-gradient(at 100% 0%, #0d1b2a 0px, transparent 50%),
                       radial-gradient(at 50% 100%, #160f29 0px, transparent 50%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: var(--mesh-bg); background-color: #000;
            color: var(--text-main); overflow: hidden; 
            position: relative; user-select: none; -webkit-user-select: none;
        }

        /* ГЛАВНЫЙ МОБИЛЬНЫЙ КОНТЕЙНЕР (ЭКРАН ТЕЛЕФОНА) */
        #stage {
            width: 100%; height: 100%;
            position: relative; display: flex; flex-direction: column;
            padding-top: var(--safe-top);
        }

        /* ЖИДКАЯ ШАПКА В СТИЛЕ APPLE */
        .ios-navbar {
            padding: 16px 20px 12px;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--glass-bg); backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            border-bottom: 1px solid var(--glass-border); z-index: 100;
        }
        .ios-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

        /* СКРОЛЛ-ЗОНА КОНТЕНТА ВКЛАДОК */
        .ios-viewport {
            flex: 1; overflow-y: auto; padding: 12px 16px calc(85px + var(--safe-bottom));
            -webkit-overflow-scrolling: touch;
        }
        .tab-view { display: none; animation: iosFade 0.25s ease; }
        .tab-view.active { display: block; }
        @keyframes iosFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* ЭЛЕМЕНТЫ СПИСКА (ЧАТЫ И КОНТАКТЫ) */
        .ios-cell {
            display: flex; align-items: center; padding: 14px;
            background: var(--glass-bg); backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--glass-border); border-radius: 16px; margin-bottom: 10px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.02); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ios-cell:active { transform: scale(0.97); background: rgba(142,142,147,0.1); }
        
        .ios-avatar {
            width: 46px; height: 46px; border-radius: 50%; color: #fff; font-weight: 700;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
            margin-right: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex-shrink: 0;
        }
        .cell-body { flex: 1; min-width: 0; }
        .cell-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .cell-name { font-weight: 600; font-size: 16px; color: var(--text-main); }
        .cell-time { font-size: 12px; color: var(--text-sub); }
        .cell-text { font-size: 14px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 👑 LIQUID BOTTOM DOCK (НИЖНИЙ БАР iOS 26) */
        .ios-dock-container {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 10px 24px calc(10px + var(--safe-bottom));
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            display: flex; justify-content: space-around; align-items: center; z-index: 200;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }
        .dock-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: transparent; border: none; color: var(--text-sub); cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); position: relative; width: 60px; height: 48px;
        }
        .dock-icon { font-size: 22px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .dock-label { font-size: 10px; font-weight: 600; margin-top: 3px; }
        
        /* Активное ликвидное состояние иконки */
        .dock-item.active { color: var(--apple-blue); }
        .dock-item.active .dock-icon { transform: translateY(-4px) scale(1.15); }

        /* ПОЛНОЭКРАННОЕ ОКНО ЧАТА (Сдвиг как в iOS приложениях) */
        #ios-chat-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
            background: var(--mesh-bg); background-color: #000; z-index: 300;
            display: flex; flex-direction: column;
            transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.32, 0.94, 0.6, 1);
            padding-top: var(--safe-top);
        }
        #ios-chat-overlay.active { transform: translateX(0); }

        .chat-header {
            padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
            background: var(--glass-bg); backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            border-bottom: 1px solid var(--glass-border);
        }
        .back-btn { background: transparent; border: none; color: var(--apple-blue); font-size: 16px; font-weight: 500; display: flex; align-items: center; cursor: pointer; }
        
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
        
        /* ПУЗЫРИ СООБЩЕНИЙ iMESSAGE STYLE */
        .bubble-wrapper { display: flex; flex-direction: column; max-width: 75%; position: relative; }
        .bubble-wrapper.out { align-self: flex-end; }
        .bubble-wrapper.in { align-self: flex-start; }
        
        .bubble-content { padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
        .out .bubble-content { background: var(--apple-gradient); color: white; border-bottom-right-radius: 4px; }
        .in .bubble-content { background: var(--bubble-in); color: var(--text-main); backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        .bubble-time { font-size: 10px; color: var(--text-sub); margin-top: 3px; align-self: flex-end; opacity: 0.7; }
        .out .bubble-time { color: rgba(255,255,255,0.8); }

        /* ИНПУТ БАР ДЛЯ ОТПРАВКИ СООБЩЕНИЙ */
        .ios-input-bar {
            padding: 10px 14px calc(10px + var(--safe-bottom));
            background: var(--glass-bg); backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            border-top: 1px solid var(--glass-border); display: flex; align-items: center; gap: 10px;
        }
        .ios-input-bar input {
            flex: 1; padding: 10px 16px; border-radius: 22px; border: 1px solid var(--glass-border);
            background: rgba(142,142,147,0.12); color: var(--text-main); font-size: 15px; outline: none;
        }
        .send-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--apple-gradient); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }

        /* 📞 МОДУЛЬ ЗВОНКОВ FACETIME GLASS */
        #facetime-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
            background: #000; z-index: 500; display: none; flex-direction: column; justify-content: space-between;
        }
        #facetime-layer.active { display: flex; }
        .stream-remote { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .stream-local { position: absolute; top: calc(20px + var(--safe-top)); right: 20px; width: 105px; height: 155px; object-fit: cover; z-index: 5; border-radius: 14px; border: 1.5px solid rgba(255,255,255,0.3); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        .facetime-actions {
            position: absolute; bottom: calc(40px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 20px; background: rgba(255,255,255,0.15); padding: 14px 28px;
            border-radius: 40px; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.2);
        }
        .ft-btn { width: 54px; height: 54px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: transform 0.1s ease; }
        .ft-btn:active { transform: scale(0.9); }
        .ft-btn.hangup { background: #ff3b30; color: white; }
        .ft-btn.cam { background: rgba(255,255,255,0.25); color: white; }

        /* УВЕДОМЛЕНИЕ О ВХОДЯЩЕМ ВЫЗОВЕ */
        #ft-banner {
            position: fixed; top: calc(12px + var(--safe-top)); left: 50%; transform: translateX(-50%) translateY(-200%);
            width: 92%; max-width: 380px; background: rgba(30, 30, 35, 0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 16px;
            display: flex; align-items: center; justify-content: space-between; color: white; z-index: 600;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #ft-banner.active { transform: translateX(-50%) translateY(0); }
        .ft-banner-btns { display: flex; gap: 8px; }
        .banner-btn { border: none; padding: 10px 18px; border-radius: 16px; font-weight: 600; font-size: 13px; cursor: pointer; }
        .banner-btn.yes { background: #34c759; color: white; }
        .banner-btn.no { background: #ff3b30; color: white; }

        /* Окна настроек и утилит */
        .settings-card { background: var(--glass-bg); backdrop-filter: var(--ios-blur); border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--glass-border); }
        .settings-row:last-child { border-bottom: none; }
        .ios-select { padding: 6px 12px; border-radius: 10px; background: rgba(142,142,147,0.15); color: var(--text-main); border: none; outline: none; font-weight: 600; }
        
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; transition: opacity 0.3s ease; }
        .auth-box { width: 88%; max-width: 360px; padding: 24px; background: rgba(255,255,255,0.9); border-radius: 24px; backdrop-filter: blur(20px); text-align: center; color: #000; }
        .ios-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); margin-bottom: 12px; font-size: 15px; outline: none; background: #fff; }
    </style>
</head>
<body>

    <div id="auth-layer" class="auth-overlay">
        <div class="auth-box">
            <h2 style="margin-bottom:6px; font-weight:700; letter-spacing:-0.5px;">Коллаж Сеть</h2>
            <p style="font-size:13px; color:#666; margin-bottom:20px;">Введите ваш рабочий логин</p>
            <input type="text" id="auth-username" class="ios-input" placeholder="Уникальный логин">
            <input type="text" id="auth-displayname" class="ios-input" placeholder="Ваше Имя и Фамилия">
            <button onclick="performInstantAuth()" style="width:100%; padding:14px; border:none; border-radius:14px; background:linear-gradient(135deg, #007af5 0%, #0056b3 100%); color:white; font-weight:600; font-size:16px;">Войти в систему</button>
        </div>
    </div>

    <div id="facetime-layer">
        <video id="remote-video" class="stream-remote" autoplay playsinline></video>
        <video id="local-video" class="stream-local" autoplay playsinline muted></video>
        <div class="facetime-actions">
            <button class="ft-btn cam" onclick="muteFacetimeCamera()">📷</button>
            <button class="ft-btn hangup" onclick="hangupFacetimeCall()">📞</button>
        </div>
    </div>

    <div id="ft-banner">
        <div>
            <div style="font-weight:700; font-size:16px;" id="ft-caller-name">Вызов...</div>
            <div style="font-size:12px; opacity:0.7;">FaceTime видеозвонок</div>
        </div>
        <div class="ft-banner-btns">
            <button class="banner-btn no" onclick="declineFacetimeCall()">Отклонить</button>
            <button class="banner-btn yes" onclick="acceptFacetimeCall()">Ответить</button>
        </div>
    </div>

    <div id="stage">
        
        <header class="ios-navbar">
            <span class="ios-title" id="ios-page-title">Чаты</span>
            <div id="my-badge-container"></div>
        </header>

        <main class="ios-viewport">
            
            <div id="view-chats" class="tab-view active"></div>

            <div id="view-contacts" class="tab-view"></div>

            <div id="view-settings" class="tab-view">
                <div class="settings-card">
                    <h3 style="margin-bottom:12px; font-size:15px; text-transform:uppercase; color:var(--text-sub)">Внешний вид</h3>
                    <div class="settings-row">
                        <label style="font-weight:500;">Тема оформления</label>
                        <select id="theme-selector" class="ios-select" onchange="toggleThemeMode(this.value)">
                            <option value="light">Светлое стекло</option>
                            <option value="dark">Ночной Mesh</option>
                        </select>
                    </div>
                </div>
                <div class="settings-card" style="text-align:center;">
                    <button onclick="clearSessionLogOut()" style="background:transparent; border:none; color:#ff3b30; font-weight:600; font-size:16px; cursor:pointer; width:100%;">Выйти из аккаунта</button>
                </div>
            </div>

        </main>

        <nav class="ios-dock-container">
            <button class="dock-item active" id="dock-chats" onclick="switchIosTab('chats')">
                <div class="dock-icon">💬</div>
                <div class="dock-label">Чаты</div>
            </button>
            <button class="dock-item" id="dock-contacts" onclick="switchIosTab('contacts')">
                <div class="dock-icon">👥</div>
                <div class="dock-label">Контакты</div>
            </button>
            <button class="dock-item" id="dock-settings" onclick="switchIosTab('settings')">
                <div class="dock-icon">⚙️</div>
                <div class="dock-label">Настройки</div>
            </button>
        </nav>

    </div>

    <div id="ios-chat-overlay">
        <header class="chat-header">
            <button class="back-btn" onclick="closeIosChatOverlay()">
                <span style="font-size:22px; margin-right:4px; line-height:1;">‹</span> Назад
            </button>
            <div style="text-align:center; flex:1; padding-right:40px;">
                <div style="font-weight:700; font-size:16px;" id="chat-target-name">...</div>
                <div style="font-size:11px; color:var(--text-sub);" id="chat-target-role">...</div>
            </div>
            <button class="send-btn" style="background:transparent; font-size:20px;" onclick="startFacetimeCallSession()" title="FaceTime Звонок">📹</button>
        </header>
        
        <div class="chat-messages" id="chat-messages-container"></div>
        
        <footer class="ios-input-bar">
            <input type="text" id="message-input-field" placeholder="Cообщение iMessage" onkeypress="if(event.key==='Enter') sendChatMessagePacket()">
            <button class="send-btn" onclick="sendChatMessagePacket()">➔</button>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUbD08gGbhrkGIGgsIZhTEWNTTU_efY",
            authDomain: "yw-83b3e.firebaseapp.com",
            databaseURL: "https://yw-83b3e-default-rtdb.firebaseio.com",
            projectId: "yw-83b3e",
            storageBucket: "yw-83b3e.firebasestorage.app",
            messagingSenderId: "513977614231",
            appId: "1:513977614231:web:0a04427784e8259fdeced2"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUserId = localStorage.getItem('liquid_uid') || null;
        let allUsers = [];
        let activeTabId = 'chats';
        let activeChatPartnerId = null;

        // WebRTC Сигнальные переменные
        let localStream = null;
        let peerConnection = null;
        let callReference = null;
        const stunConfiguration = { iceServers: [{ urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] }] };

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('liquid_theme') || 'light';
            toggleThemeMode(savedTheme);
            document.getElementById('theme-selector').value = savedTheme;

            database.ref('users').on('value', (snap) => {
                const data = snap.val() || {};
                allUsers = Object.values(data);
                renderApplicationInterface();
                listenIncomingFacetimeCalls();
            });

            if(currentUserId) {
                document.getElementById('auth-layer').style.opacity = '0';
                setTimeout(() => document.getElementById('auth-layer').style.display = 'none', 300);
            }
        });

        function performInstantAuth() {
            const login = document.getElementById('auth-username').value.trim().toLowerCase();
            const name = document.getElementById('auth-displayname').value.trim();
            if(!login || !name) return;

            const existing = allUsers.find(u => u.login === login);
            if(existing) {
                currentUserId = existing.id;
            } else {
                currentUserId = "uid_" + Date.now();
                const colors = ["#ff2d55", "#007af5", "#34c759", "#ff9500", "#af52de"];
                const color = colors[Math.floor(Math.random() * colors.length)];
                database.ref('users/' + currentUserId).set({
                    id: currentUserId, login, name, color, role: "Сотрудник Коллаж"
                });
            }
            localStorage.setItem('liquid_uid', currentUserId);
            document.getElementById('auth-layer').style.opacity = '0';
            setTimeout(() => document.getElementById('auth-layer').style.display = 'none', 300);
            renderApplicationInterface();
        }

        function clearSessionLogOut() {
            localStorage.removeItem('liquid_uid');
            location.reload();
        }

        function switchIosTab(tabName) {
            activeTabId = tabName;
            document.querySelectorAll('.dock-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-view').forEach(el => el.classList.remove('active'));
            
            document.getElementById('dock-' + tabName).classList.add('active');
            document.getElementById('view-' + tabName).classList.add('active');

            const titles = { chats: "Чаты", contacts: "Контакты", settings: "Настройки" };
            document.getElementById('ios-page-title').innerText = titles[tabName];
            renderApplicationInterface();
        }

        function renderApplicationInterface() {
            if(!currentUserId) return;
            const me = allUsers.find(u => u.id === currentUserId);
            if(me) {
                document.getElementById('my-badge-container').innerHTML = `<div class="ios-avatar" style="background:${me.color}; margin:0; width:34px; height:34px; font-size:12px;">${me.name.substring(0,2).toUpperCase()}</div>`;
            }

            if(activeTabId === 'contacts') renderContactsTab();
            if(activeTabId === 'chats') renderChatsTab();
        }

        function renderContactsTab() {
            const container = document.getElementById('view-contacts');
            container.innerHTML = '';
            allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                const cell = document.createElement('div');
                cell.className = 'ios-cell';
                cell.onclick = () => openIosChatOverlayWith(u.id);
                cell.innerHTML = `
                    <div class="ios-avatar" style="background:${u.color}">${u.name.substring(0,2).toUpperCase()}</div>
                    <div class="cell-body">
                        <div class="cell-row"><span class="cell-name">${u.name}</span></div>
                        <div class="cell-text">${u.role}</div>
                    </div>
                `;
                container.appendChild(cell);
            });
        }

        function renderChatsTab() {
            const container = document.getElementById('view-chats');
            container.innerHTML = '';
            
            database.ref('messages').once('value', (snapshot) => {
                const msgs = snapshot.val() || {};
                let hasChats = false;

                allUsers.filter(u => u.id !== currentUserId).forEach(u => {
                    const chatKey = [currentUserId, u.id].sort().join('__');
                    if(!msgs[chatKey]) return;
                    hasChats = true;

                    const list = Object.values(msgs[chatKey]);
                    const lastMsg = list[list.length - 1];

                    const cell = document.createElement('div');
                    cell.className = 'ios-cell';
                    cell.onclick = () => openIosChatOverlayWith(u.id);
                    cell.innerHTML = `
                        <div class="ios-avatar" style="background:${u.color}">${u.name.substring(0,2).toUpperCase()}</div>
                        <div class="cell-body">
                            <div class="cell-row">
                                <span class="cell-name">${u.name}</span>
                                <span class="cell-time">${lastMsg.time || ''}</span>
                            </div>
                            <div class="cell-text">${lastMsg.text || ''}</div>
                        </div>
                    `;
                    container.appendChild(cell);
                });

                if(!hasChats) {
                    container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-sub); font-size:14px;">Нет активных диалогов.<br>Перейдите во вкладку Контакты.</div>`;
                }
            });
        }

        let currentMessagesListener = null;

        function openIosChatOverlayWith(partnerId) {
            activeChatPartnerId = partnerId;
            const targetUser = allUsers.find(u => u.id === partnerId);
            if(!targetUser) return;

            document.getElementById('chat-target-name').innerText = targetUser.name;
            document.getElementById('chat-target-role').innerText = targetUser.role;
            document.getElementById('ios-chat-overlay').classList.add('active');

            const chatKey = [currentUserId, partnerId].sort().join('__');
            if(currentMessagesListener) currentMessagesListener.off();

            currentMessagesListener = database.ref('messages/' + chatKey);
            currentMessagesListener.on('value', (snap) => {
                const data = snap.val() || {};
                const list = Object.keys(data).map(k => data[k]);
                
                const msgContainer = document.getElementById('chat-messages-container');
                msgContainer.innerHTML = '';
                
                list.forEach(m => {
                    const isMe = m.senderId === currentUserId;
                    const wrapper = document.createElement('div');
                    wrapper.className = `bubble-wrapper ${isMe ? 'out' : 'in'}`;
                    wrapper.innerHTML = `
                        <div class="bubble-content">${m.text}</div>
                        <div class="bubble-time">${m.time}</div>
                    `;
                    msgContainer.appendChild(wrapper);
                });
                msgContainer.scrollTop = msgContainer.scrollHeight;
            });
        }

        function closeIosChatOverlay() {
            document.getElementById('ios-chat-overlay').classList.remove('active');
            activeChatPartnerId = null;
            renderChatsTab();
        }

        function sendChatMessagePacket() {
            const input = document.getElementById('message-input-field');
            const text = input.value.trim();
            if(!text || !activeChatPartnerId) return;

            const chatKey = [currentUserId, activeChatPartnerId].sort().join('__');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            database.ref('messages/' + chatKey).push({
                senderId: currentUserId,
                text: text,
                time: time
            });
            input.value = '';
        }

        function toggleThemeMode(mode) {
            localStorage.setItem('liquid_theme', mode);
            document.documentElement.setAttribute('data-theme', mode);
        }

        // =========================================================================
        // 📞 КОРПОРАТИВНЫЙ МОДУЛЬ ЗВОНКОВ FACETIME (WebRTC Signaling Engine)
        // =========================================================================

        function listenIncomingFacetimeCalls() {
            if(!currentUserId) return;
            database.ref('facetime').on('value', async (snapshot) => {
                const data = snapshot.val() || {};
                for (let callId in data) {
                    const session = data[callId];
                    if(session.calleeId === currentUserId && session.status === 'ringing') {
                        callReference = database.ref('facetime/' + callId);
                        const caller = allUsers.find(u => u.id === session.callerId);
                        
                        document.getElementById('ft-caller-name').innerText = caller ? caller.name : "Абонент";
                        document.getElementById('ft-banner').classList.add('active');

                        callReference.on('value', (innerSnap) => {
                            if(!innerSnap.exists() || innerSnap.val().status === 'ended') {
                                cleanupFacetimeDom();
                            }
                        });
                        break;
                    }
                }
            });
        }

        async function startFacetimeCallSession() {
            if(!activeChatPartnerId) return;
            const callId = [currentUserId, activeChatPartnerId].sort().join('__');
            callReference = database.ref('facetime/' + callId);

            document.getElementById('facetime-layer').classList.add('active');

            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;

            peerConnection = new RTCPeerConnection(stunConfiguration);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (e) => {
                document.getElementById('remote-video').srcObject = e.streams[0];
            };

            peerConnection.onicecandidate = (e) => {
                if(e.candidate) callReference.child('callerCandidates').push(e.candidate.toJSON());
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            await callReference.set({
                id: callId,
                callerId: currentUserId,
                calleeId: activeChatPartnerId,
                status: 'ringing',
                offer: { type: offer.type, sdp: offer.sdp }
            });

            callReference.child('answer').on('value', async (snap) => {
                const ans = snap.val();
                if(ans && peerConnection.signalingState !== "stable") {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(ans));
                }
            });

            callReference.child('calleeCandidates').on('child_added', (snap) => {
                if(snap.val() && peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
        }

        async function acceptFacetimeCall() {
            document.getElementById('ft-banner').classList.remove('active');
            document.getElementById('facetime-layer').classList.add('active');

            const snap = await callReference.get();
            const sessionData = snap.val();

            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;

            peerConnection = new RTCPeerConnection(stunConfiguration);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (e) => {
                document.getElementById('remote-video').srcObject = e.streams[0];
            };

            peerConnection.onicecandidate = (e) => {
                if(e.candidate) callReference.child('calleeCandidates').push(e.candidate.toJSON());
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(sessionData.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            await callReference.update({
                status: 'connected',
                answer: { type: answer.type, sdp: answer.sdp }
            });

            callReference.child('callerCandidates').on('child_added', (cSnap) => {
                if(cSnap.val() && peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(cSnap.val()));
            });
        }

        function declineFacetimeCall() {
            document.getElementById('ft-banner').classList.remove('active');
            if(callReference) {
                callReference.update({ status: 'ended' });
                callReference.remove();
            }
        }

        function hangupFacetimeCall() {
            if(callReference) {
                callReference.update({ status: 'ended' });
                callReference.remove();
            }
            cleanupFacetimeDom();
        }

        function cleanupFacetimeDom() {
            document.getElementById('facetime-layer').classList.remove('active');
            document.getElementById('ft-banner').classList.remove('active');
            if(localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            if(peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
        }

        function muteFacetimeCamera() {
            if(localStream) {
                const track = localStream.getVideoTracks()[0];
                track.enabled = !track.enabled;
            }
        }
    </script>
</body>
